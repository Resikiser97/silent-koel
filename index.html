    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        #game-container {
            position: relative;
            width: 1600px;
            height: 900px;
            border: 1px solid #333;
        }

<script>
// =============================================================
// 設定介面全域 Handler 引用（供 hideSettings 清理用）
// =============================================================
let _settingsKeyHandler   = null;
let _settingsMouseHandler = null;
let _rebindBlink          = null;
let _rebindTimeout        = null;

// =============================================================
// 預設設定值
// =============================================================
const DEFAULT_SETTINGS = {
    volume: { master: 80, music: 70, sfx: 80, masterOn: true, musicOn: true, sfxOn: true },
    keys:   { up: 'w', down: 's', left: 'a', right: 'd', attack: ' ' }
};

// =============================================================
// 音效管理器
// =============================================================
const AudioManager = {
    _sounds: {},
    _music:  null,
    _currentMusicKey: null,

    init() {
        Object.entries(AUDIO_FILES).forEach(([key, src]) => {
            if (Array.isArray(src)) {
                this._sounds[key] = src.map(s => { const a = new Audio(s); a.preload = 'auto'; return a; });
            } else {
                const a = new Audio(src); a.preload = 'auto';
                this._sounds[key] = a;
            }
        });
    },

    _sfxVol() {
        const v = gameState.settings.volume;
        if (!v.masterOn || !v.sfxOn) return 0;
        return (v.master / 100) * (v.sfx / 100);
    },

    _musicVol() {
        const v = gameState.settings.volume;
        if (!v.masterOn || !v.musicOn) return 0;
        return (v.master / 100) * (v.music / 100);
    },

    play(key) {
        const src = this._sounds[key];
        if (!src) return;
        const vol = this._sfxVol();
        let audio;
        if (Array.isArray(src)) {
            audio = src[Math.floor(Math.random() * src.length)].cloneNode();
        } else {
            audio = src.cloneNode();
        }
        audio.volume = vol;
        audio.play().catch(() => {});
    },

    playMusic(key) {
        if (this._currentMusicKey === key) {
            if (this._music) { try { this._music.volume = this._musicVol(); } catch(e) {} }
            return;
        }
        const srcEntry = this._sounds[key];
        if (!srcEntry) return;
        const newAudio = Array.isArray(srcEntry) ? srcEntry[0] : srcEntry;

        const oldMusic = this._music;
        if (oldMusic && !oldMusic.paused) {
            let ov = oldMusic.volume;
            const step = Math.max(0.02, ov / 10);
            const fadeOut = setInterval(() => {
                ov = Math.max(0, ov - step);
                try { oldMusic.volume = ov; } catch(e) {}
                if (ov <= 0) { clearInterval(fadeOut); oldMusic.pause(); oldMusic.currentTime = 0; }
            }, 50);
        }

        this._currentMusicKey = key;
        newAudio.loop = true;
        newAudio.currentTime = 0;
        newAudio.volume = 0;
        newAudio.play().catch(() => {});
        this._music = newAudio;

        const target = this._musicVol();
        let fv = 0;
        const step = Math.max(0.02, target / 10);
        const fadeIn = setInterval(() => {
            fv = Math.min(target, fv + step);
            try { newAudio.volume = fv; } catch(e) {}
            if (fv >= target) clearInterval(fadeIn);
        }, 50);
    },

    stopMusic() {
        if (this._music) {
            this._music.pause();
            this._music.currentTime = 0;
            this._music = null;
        }
        this._currentMusicKey = null;
    },

    refreshMusicVolume() {
        if (this._music) { try { this._music.volume = this._musicVol(); } catch(e) {} }
    }
};

// =============================================================
// 全局遊戲狀態管理 (gameState)
// 所有可變的、需要追蹤的數據都放在這裡，方便未來擴充和調試。
// =============================================================

    canvasWidth: 1600,
    canvasHeight: 900,

    player: {

        attack: 0, attackSpeed: 1.0, attackRange: 50,

        comboCrabPoison: false, comboShellArmor: false, comboBrainEye: false,

    stats: {

        hpCurrent: 50,

        timeStatus: "20:00",
        dayCycle: "白天"
    },

    keys: {
        w: false, a: false, s: false, d: false
    },
    xpThreshold: 100,
    organSelectionActive: false,
    pendingOrganSelections: 0,
    treasures: [],
    devInput: '',
    devMode: false,
    timeRemaining: 600,
    lastTimeTick: 0,
    gameOver: false,
    spawnTimers: { neutral: 0, hostile: 0 },
    creatureStrengthMultiplier: 0,
    isNight: false,
    currentPhaseIndex: 0,
    dayNightMessage: { text: '', timer: 0 },
    levelUpMessage: { text: '', timer: 0 },
    skillPoints: 0,
    playerSkills: { vitality: 0, agility: 0, forager: 0, hunter: 0, tenacity: 0, organMemory: 0, luckyReroll: 0, collectionAddiction: 0, terribleFang: 0 },

    settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS))
};


// =============================================================
// 畫布及上下文設定 (Canvas Setup)
// =============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 地圖與視窗尺寸常數
const MAP_WIDTH  = 8000;
const MAP_HEIGHT = 8000;
const VIEW_W     = 1600;
const VIEW_H     = 900;

// ORGANS、SKILLS、EVOLUTION_PATHS、COMBOS、CREATURE_CONFIG 由 gameConfig.js 提供

// 環繞世界距離計算（取最短路徑）
function wrappedDistance(x1, y1, x2, y2) {
    let dx = Math.abs(x2 - x1);
    if (dx > MAP_WIDTH  / 2) dx = MAP_WIDTH  - dx;
    let dy = Math.abs(y2 - y1);
    if (dy > MAP_HEIGHT / 2) dy = MAP_HEIGHT - dy;
    return Math.sqrt(dx * dx + dy * dy);
}

// 環繞世界方向向量（從 a 到 b 的最短路徑 dx/dy）
function wrappedDelta(ax, ay, bx, by) {
    let dx = bx - ax;
    let dy = by - ay;
    if (dx >  MAP_WIDTH  / 2) dx -= MAP_WIDTH;
    else if (dx < -MAP_WIDTH  / 2) dx += MAP_WIDTH;
    if (dy >  MAP_HEIGHT / 2) dy -= MAP_HEIGHT;
    else if (dy < -MAP_HEIGHT / 2) dy += MAP_HEIGHT;
    return { dx, dy };
}

// 世界座標轉換為螢幕座標（含環繞修正）
function worldToScreen(wx, wy) {
    let sx = wx - gameState.camera.x;
    let sy = wy - gameState.camera.y;
    if (sx < -MAP_WIDTH  / 2) sx += MAP_WIDTH;
    else if (sx >  MAP_WIDTH  / 2) sx -= MAP_WIDTH;
    if (sy < -MAP_HEIGHT / 2) sy += MAP_HEIGHT;
    else if (sy >  MAP_HEIGHT / 2) sy -= MAP_HEIGHT;
    return { x: sx, y: sy };
}

// 平滑視角跟隨：玩家進入視窗邊界 25% 才開始移動視角
function updateCamera() {
    const p = gameState.player;
    const cam = gameState.camera;
    const marginX = VIEW_W * 0.25;
    const marginY = VIEW_H * 0.25;
    let screenX = p.x - cam.x;
    let screenY = p.y - cam.y;
    if (screenX < -MAP_WIDTH  / 2) screenX += MAP_WIDTH;
    else if (screenX >  MAP_WIDTH  / 2) screenX -= MAP_WIDTH;
    if (screenY < -MAP_HEIGHT / 2) screenY += MAP_HEIGHT;
    else if (screenY >  MAP_HEIGHT / 2) screenY -= MAP_HEIGHT;
    let targetX = cam.x;
    let targetY = cam.y;
    if (screenX < marginX)               targetX = cam.x + (screenX - marginX);
    else if (screenX > VIEW_W - marginX) targetX = cam.x + (screenX - (VIEW_W - marginX));
    if (screenY < marginY)               targetY = cam.y + (screenY - marginY);
    else if (screenY > VIEW_H - marginY) targetY = cam.y + (screenY - (VIEW_H - marginY));
    cam.x += (targetX - cam.x) * 0.15;
    cam.y += (targetY - cam.y) * 0.15;
    cam.x = ((cam.x % MAP_WIDTH)  + MAP_WIDTH)  % MAP_WIDTH;
    cam.y = ((cam.y % MAP_HEIGHT) + MAP_HEIGHT) % MAP_HEIGHT;
}

// =============================================================
// 地形系統 (Biome System)
// =============================================================

// 根據世界座標回傳地形：'forest' | 'ocean' | 'desert'
function getBiome(x, y) {
    const dist = Math.sqrt((x - 4000) * (x - 4000) + (y - 4000) * (y - 4000));
    if (dist < 2000) return 'forest';
    if (x > 5000 || y > 5000) return 'ocean';
    return 'desert';
}

// 根據玩家位置計算帶過渡效果的背景顏色
function getBgColor() {
    const p = gameState.player;
    const night = gameState.isNight;
    const C = {
        forest: night ? [26,46,26]    : [84,153,84],
        ocean:  night ? [10,31,48]    : [26,74,107],
        desert: night ? [92,61,10]    : [196,163,90]
    };
    const cx = 4000, cy = 4000;
    const dx = p.x - cx, dy = p.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const TRANS = 200;
    const mix = (a, b, t) => Math.round(a * (1 - t) + b * t);

    // 森林邊界過渡
    const toEdge = Math.abs(dist - 2000);
    if (toEdge < TRANS) {
        const t = (1 - toEdge / TRANS) * 0.45;
        const biome = getBiome(p.x, p.y);
        let other;
        if (biome === 'forest') {
            const od = dist > 0 ? 2200 / dist : 0;
            other = getBiome(cx + dx * od, cy + dy * od);
        } else {
            other = 'forest';
        }
        const a = C[biome], b = C[other];
        return 'rgb(' + mix(a[0],b[0],t) + ',' + mix(a[1],b[1],t) + ',' + mix(a[2],b[2],t) + ')';
    }

    // 海洋/沙漠邊界過渡（僅在森林外）
    if (dist >= 2000) {
        const biome = getBiome(p.x, p.y);
        const minD = Math.min(Math.abs(p.x - 5000), Math.abs(p.y - 5000));
        if (minD < TRANS) {
            const t = (1 - minD / TRANS) * 0.45;
            const other = biome === 'ocean' ? 'desert' : 'ocean';
            const a = C[biome], b = C[other];
            return 'rgb(' + mix(a[0],b[0],t) + ',' + mix(a[1],b[1],t) + ',' + mix(a[2],b[2],t) + ')';
        }
    }

    const c = C[getBiome(p.x, p.y)];
    return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
}

// =============================================================
// 初始化遊戲元素 - 果子生成相關
// =============================================================

/**
 * 生成隨機樹木物件。
 */
function generateTrees(count) {
    const trees = [];
    for (let i = 0; i < count; i++) {
        const x = Math.floor(Math.random() * (MAP_WIDTH  - 100)) + 50;
        const y = Math.floor(Math.random() * (MAP_HEIGHT - 100)) + 50;
        const isLarge = Math.random() < 0.4;
        const radius = isLarge
            ? Math.floor(Math.random() * 11 + 25)
            : Math.floor(Math.random() *  9 + 12);
        const biome = getBiome(x, y);
        const treeColor = biome === 'ocean' ? '#005599' : (biome === 'desert' ? '#7B6B00' : 'darkgreen');
        const treeSize = isLarge ? 'large' : 'small';
        trees.push({ x, y, radius, color: treeColor, isLarge, treeSize, fruitCount: 0, fruitTimer: 0 });
    }
    gameState.trees = trees;
    console.log("--- 初始化完成：共生成 " + gameState.trees.length + " 棵樹木（大/小各佔約4/6）---");
}

// 從指定樹木附近生成一顆果子（半徑+20px 範圍內隨機）
function spawnFruitFromTree(tree) {
    for (let attempts = 0; attempts < 20; attempts++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = tree.radius + 5 + Math.random() * 20;
        const x = tree.x + Math.cos(angle) * dist;
        const y = tree.y + Math.sin(angle) * dist;
        if (x < 10 || x > MAP_WIDTH - 10 || y < 10 || y > MAP_HEIGHT - 10) continue;
        let tooClose = false;
        for (const fruit of gameState.fruits) {
            const dx = x - fruit.x, dy = y - fruit.y;
            if (dx * dx + dy * dy < 400) { tooClose = true; break; }
        }
        if (tooClose) continue;
        const fb = getBiome(x, y);
        const fc = fb === 'ocean' ? '#0088FF' : (fb === 'desert' ? '#FF8800' : 'red');
        const fruit = { x, y, radius: 6, color: fc };
        gameState.fruits.push(fruit);
        return fruit;
    }
    return null;
}

// 從隨機樹木生成果子（供開發者模式使用）
function spawnFruit() {
    if (gameState.trees.length === 0) return null;
    const tree = gameState.trees[Math.floor(Math.random() * gameState.trees.length)];
    return spawnFruitFromTree(tree);
}


// =============================================================
// 輸入事件處理 (Input Handling)
// =============================================================
function handleKeyDown(e) {
    if (e.key === 'Escape') {
        if (gameState.settingsOpen) { hideSettings(); } else if (!gameState.gameOver) { showSettings(); }
        return;
    }
    if (gameState._rebindTarget) { e.preventDefault(); return; }

    const key = e.key.toLowerCase();
    const sk = gameState.settings.keys;
    const moveKeys = [sk.up, sk.down, sk.left, sk.right, 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'];
    if (moveKeys.includes(key)) {
        gameState.keys[key] = true;
        e.preventDefault();
    }
    if (key === sk.attack || e.key === ' ') {
        e.preventDefault();
        if (!gameState.organSelectionActive && !gameState.settingsOpen) playerAttack();
    }
    gameState.devInput = (gameState.devInput + e.key).slice(-8);
    if (gameState.devInput === '77777778') toggleDevMode();
}

function handleKeyUp(e) {
    const key = e.key.toLowerCase();
    const sk = gameState.settings.keys;
    const moveKeys = [sk.up, sk.down, sk.left, sk.right, 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'];
    if (moveKeys.includes(key)) gameState.keys[key] = false;
}


// =============================================================
// 核心遊戲邏輯函數 (Game Logic)
// =============================================================

/**
 * 更新玩家的移動和碰撞檢測。
 */
function updatePlayerMovement() {
    const p = gameState.player;
    const sk = gameState.settings.keys;
    let dx = 0, dy = 0;
    if (gameState.keys[sk.up]   || gameState.keys['arrowup'])    dy -= p.speed;
    if (gameState.keys[sk.down] || gameState.keys['arrowdown'])  dy += p.speed;
    if (gameState.keys[sk.left] || gameState.keys['arrowleft'])  dx -= p.speed;
    if (gameState.keys[sk.right]|| gameState.keys['arrowright']) dx += p.speed;
    if (dx === 0 && dy === 0) return;
    p.x = ((p.x + dx) % MAP_WIDTH  + MAP_WIDTH)  % MAP_WIDTH;
    p.y = ((p.y + dy) % MAP_HEIGHT + MAP_HEIGHT) % MAP_HEIGHT;
}


/**
 * 新增功能：檢查玩家與果子是否發生重疊（吃果子）。
 */
function checkFruitCollision() {
    const p = gameState.player;
    // 拾取範圍包含大腦的吸取加成
    const collisionRadius = p.radius + 6 + p.pickupRange;

    for (let i = gameState.fruits.length - 1; i >= 0; i--) {
        const fruit = gameState.fruits[i];
        if (wrappedDistance(p.x, p.y, fruit.x, fruit.y) < collisionRadius) {
            const ev = p.evolution;
            // 草食Lv2/3 果子XP加成（各等級的最終值）
            const herbBonus = ev.herbivore >= 2 ? EVOLUTION_PATHS.herbivore.levels[ev.herbivore - 1].fruitXPBonus : 0;
            // 雜食果子XP加成
            const omniBonus = ev.omnivore > 0 ? EVOLUTION_PATHS.omnivore.levels[ev.omnivore - 1].fruitXPBonus : 0;
            const fruitXP = 5 + (gameState.playerSkills.forager || 0) * 3 + herbBonus + omniBonus;
            addXP(fruitXP);
            AudioManager.play('eatFruit');
            // 雜食Lv3：10%機率吃東西回血5
            if (ev.omnivore >= 3 && Math.random() < 0.1) {
                gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + 5);
                showFloatingText(p.x, p.y - 40, '飽食！HP+5', '#00FF88');
            }

            // 1. 移除果子
            gameState.fruits.splice(i, 1);

            // 2. 視覺提示 (新增功能)
            showXPPopup(p.x, p.y, fruitXP);
            
            return true; // 確認發生了碰撞並處理了狀態更新
        }
    }
    return false;
}


// 每棵樹獨立管理附近果子生產，使用 deltaTime 累加計時（ms）
function updateTreeFruitProduction(deltaTime) {
    for (const tree of gameState.trees) {
        const range     = tree.isLarge ? 80 : 60;
        const maxNearby = tree.isLarge ?  5 :  3;
        let nearby = 0;
        for (const fruit of gameState.fruits) {
            const dx = fruit.x - tree.x, dy = fruit.y - tree.y;
            if (dx * dx + dy * dy < range * range) nearby++;
        }
        tree.fruitCount = nearby;
        if (nearby >= maxNearby) continue;
        tree.fruitTimer += deltaTime;
        const interval = nearby === 0 ? 9000 : (nearby === 1 ? 19500 : 30000);
        if (tree.fruitTimer >= interval) {
            tree.fruitTimer = 0;
            spawnFruitFromTree(tree);
        }
    }
}

/**
 * 生成果子的視覺提示。
 */
function showXPPopup(wx, wy, amount) {
    const s = worldToScreen(wx, wy);
    if (s.x < -30 || s.x > VIEW_W + 30 || s.y < -30 || s.y > VIEW_H + 30) return;
    const popup = document.createElement('div');
    popup.id = 'xp-popup';
    popup.innerText = `+${amount} XP`;
    popup.style.left = `${s.x - 15}px`;

    setTimeout(() => {

        popup.remove();

}


/**
 * 繪製所有遊戲元素到畫布上。
*/
function drawGame() {
    // 根據玩家地形和日夜狀態設定背景顏色（含過渡）
    ctx.fillStyle = getBgColor();
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    // 2. 繪製環境 (樹木)
    gameState.trees.forEach(tree => {
        const s = worldToScreen(tree.x, tree.y);
        if (s.x < -tree.radius - 50 || s.x > VIEW_W + tree.radius + 50 ||
            s.y < -tree.radius - 50 || s.y > VIEW_H + tree.radius + 50) return;
        ctx.fillStyle = tree.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, tree.radius, 0, Math.PI * 2);
        ctx.fill();
        // 開發者模式：顯示附近果子數 / 最大上限
        if (gameState.devMode) {
            const maxN = tree.isLarge ? 5 : 3;
            ctx.save();
            ctx.font = '9px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(tree.fruitCount + '/' + maxN, s.x, s.y + tree.radius + 2);
            ctx.restore();
        }
    });

    // 3. 繪製果子
    gameState.fruits.forEach(fruit => {
        const s = worldToScreen(fruit.x, fruit.y);
        if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) return;
        ctx.fillStyle = fruit.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, fruit.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    // 4. 繪製寶物
    drawTreasures();

    // 5. 繪製屍體（在生物之下）
    drawCorpses();
    drawCorpseEatingBars();

    // 5. 繪製中立生物
    drawNeutralCreatures();

    // 6. 繪製敵意生物
    drawHostileCreatures();

    // 7. 繪製 Boss
    if (gameState.boss && gameState.boss.hp > 0) {
        const boss = gameState.boss;
        const bs = worldToScreen(boss.x, boss.y);
        if (bs.x >= -50 && bs.x <= VIEW_W + 50 && bs.y >= -50 && bs.y <= VIEW_H + 50) {
            const flicker = Math.sin(Date.now() * 0.006) * 0.4 + 0.7;
            ctx.save();
            ctx.shadowColor = boss.glowColor || '#8B4513';
            ctx.shadowBlur = 10 + flicker * 12;
            ctx.globalAlpha = 0.85 + flicker * 0.15;
            ctx.fillStyle = boss.state === 'chasing' ? (boss.colorChasing || '#2A0D00') : (boss.color || '#3B1E08');
            ctx.beginPath();
            ctx.arc(bs.x, bs.y, boss.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            ctx.save();
            ctx.shadowColor = '#000000'; ctx.shadowBlur = 4;
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(boss.name || boss.label || 'Boss', bs.x, bs.y - boss.radius - 32);
            ctx.restore();
            const bBarW = 50, bBarH = 6;
            const bBarX = bs.x - bBarW / 2;
            const bBarY = bs.y - boss.radius - 24;
            ctx.fillStyle = '#550000';
            ctx.fillRect(bBarX, bBarY, bBarW, bBarH);
            ctx.fillStyle = '#FF4400';
            ctx.fillRect(bBarX, bBarY, bBarW * (boss.hp / boss.maxHp), bBarH);
        }
    }

    // 7b. 繪製精英怪
    drawEliteCreature();

    // 8. 攻擊範圍視覺圓圈（0.2 秒淡出）
    const p = gameState.player;
    const ps = worldToScreen(p.x, p.y);
    if (p.attackVisual > 0 && Date.now() - p.attackVisual < 200) {
        const alpha = 1 - (Date.now() - p.attackVisual) / 200;
        ctx.strokeStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
        ctx.fillStyle   = 'rgba(255,255,255,' + (alpha * 0.12).toFixed(2) + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ps.x, ps.y, p.attackRange, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.lineWidth = 1;
    }

    // 9. 繪製玩家角色 (噪鵑)
    if (gameState.isNight) {
        ctx.fillStyle = 'rgba(0,255,136,0.9)';
        ctx.beginPath();
        ctx.arc(ps.x, ps.y, p.radius + 3, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(ps.x, ps.y, p.radius, 0, Math.PI * 2);
    ctx.fill();

    drawEliteArrow();

    // 9. 繪製器官清單（左下角）
    drawOrganUI();

    // 版本資訊（左下角最底部，與器官框不重疊）
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = 'white';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('© ' + GAME_INFO.author, 6, VIEW_H - 20);
    ctx.fillText(GAME_INFO.version, 6, VIEW_H - 5);
    ctx.restore();

    // 10. 繪製升級提示文字（畫面中央偏上，2 秒淡出）
    const lvMsg = gameState.levelUpMessage;
    if (lvMsg.text && Date.now() - lvMsg.timer < 2000) {
        const lvAlpha = Math.max(0, 1 - (Date.now() - lvMsg.timer) / 2000);
        ctx.save();
        ctx.globalAlpha = lvAlpha;
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(lvMsg.text, VIEW_W / 2, VIEW_H / 2 - 60);
        ctx.restore();
    }

    // 11. 繪製日夜切換提示文字（畫面中央，2 秒淡出）
    const msg = gameState.dayNightMessage;
    if (msg.text && Date.now() - msg.timer < 2000) {
        const alpha = Math.max(0, 1 - (Date.now() - msg.timer) / 2000);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'white';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(msg.text, VIEW_W / 2, VIEW_H / 2);
        ctx.restore();
    }
}

// =============================================================
// 中立生物系統 (Neutral Creatures)
// =============================================================

function spawnNeutralCreatures() {
    gameState.neutralCreatures = [];
    const GRID = 5, BLOCK = 1600; // 5x5 格，每格 1600px
    for (let gx = 0; gx < GRID; gx++) {
        for (let gy = 0; gy < GRID; gy++) {
            for (let k = 0; k < 2; k++) { // 每格 2 隻，共 50 隻
                const x = gx * BLOCK + 50 + Math.random() * (BLOCK - 100);
                const y = gy * BLOCK + 50 + Math.random() * (BLOCK - 100);
                const diet = Math.random() < 0.5 ? 'herbivore' : 'omnivore';
                const canFight = Math.random() < 0.5;
                gameState.neutralCreatures.push({
                    x, y, radius: 8, hp: 30, maxHp: 30, speed: 0.8,
                    diet, canFight, state: 'idle',
                    wanderTarget: null, lastWanderTime: Date.now(), lastDamageTime: 0
                });
            }
        }
    }
    console.log("--- 中立生物生成完成：" + gameState.neutralCreatures.length + " 隻（5x5 格，每格2隻）---");
}

function updateNeutralCreatures() {
    const now = Date.now();
    const p = gameState.player;

    for (const creature of gameState.neutralCreatures) {
        if (creature.hp <= 0) continue;
        if (creature.stunnedUntil && now < creature.stunnedUntil) continue;

        // 激進化生物：行為與敵意生物相同
        if (creature.diet === 'aggressive') {
            const aggroRange = creature.aggroRange || 120;
            let target = null;
            let bestDist = aggroRange;
            const dp = wrappedDistance(creature.x, creature.y, p.x, p.y);
            if (dp < bestDist) { target = p; bestDist = dp; }
            for (const h of gameState.hostileCreatures) {
                if (h.hp <= 0) continue;
                const d = wrappedDistance(creature.x, creature.y, h.x, h.y);
                if (d < bestDist) { target = h; bestDist = d; }
            }
            if (target) {
                creature.state = 'chasing';
                const { dx, dy } = wrappedDelta(creature.x, creature.y, target.x, target.y);
                const dist = Math.sqrt(dx * dx + dy * dy);
                const atkRange = creature.radius + (target.radius || 10) + 5;
                if (dist <= atkRange) {
                    if (now - (creature.attackCooldown || 0) >= 1000) {
                        creature.attackCooldown = now;
                        if (target === p) {
                            applyDamageToPlayer(creature.damage || 8, creature);
                        } else {
                            target.hp -= creature.damage || 8;
                            if (target.hp <= 0) gameState.corpses.push({ x: target.x, y: target.y, radius: target.radius, spawnTime: now });
                        }
                    }
                } else {
                    const angle = Math.atan2(dy, dx);
                    moveCreature(creature, creature.x + Math.cos(angle) * creature.speed, creature.y + Math.sin(angle) * creature.speed);
                }
            } else {
                creature.state = 'wandering';
                if (!creature.wanderTarget || now - creature.lastWanderTime >= 2000) {
                    creature.wanderTarget = { x: Math.random() * MAP_WIDTH, y: Math.random() * MAP_HEIGHT };
                    creature.lastWanderTime = now;
                }
                if (creature.wanderTarget) {
                    const { dx: wdx, dy: wdy } = wrappedDelta(creature.x, creature.y, creature.wanderTarget.x, creature.wanderTarget.y);
                    if (Math.sqrt(wdx * wdx + wdy * wdy) < 2) { creature.wanderTarget = null; }
                    else {
                        const wa = Math.atan2(wdy, wdx);
                        moveCreature(creature, creature.x + Math.cos(wa) * creature.speed, creature.y + Math.sin(wa) * creature.speed);
                    }
                }
            }
            continue;
        }

        const distToPlayer = wrappedDistance(creature.x, creature.y, p.x, p.y);
        const touchDist = creature.radius + p.radius;

        // 草食安撫：Lv2=100px 不逃跑，Lv3=150px 完全友善
        const herbLv = p.evolution.herbivore || 0;
        const isCalm     = herbLv >= 2 && distToPlayer < 100;
        const isFriendly = herbLv >= 3 && distToPlayer < 150;

        // 判斷與玩家碰撞狀態
        if (distToPlayer < touchDist) {
            if (!isFriendly) {
                creature.state = (isCalm && !creature.canFight) ? 'idle' : (creature.canFight ? 'fighting' : 'fleeing');
            }
        } else if ((creature.state === 'fighting' || creature.state === 'fleeing') && distToPlayer > touchDist + 50) {
            creature.state = 'idle';
        } else if (isFriendly && (creature.state === 'fighting' || creature.state === 'fleeing')) {
            creature.state = 'idle';
        } else if (isCalm && creature.state === 'fleeing') {
            creature.state = 'idle';
        }

        // fighting：每秒扣玩家 3HP，生物原地不動
        if (creature.state === 'fighting') {
            if (now - creature.lastDamageTime >= 1000) {
                applyDamageToPlayer(3, creature);
                creature.lastDamageTime = now;
            }
            continue;
        }

        // fleeing：逃離玩家（取環繞最短路徑的反方向）
        if (creature.state === 'fleeing') {
            const { dx: fdx, dy: fdy } = wrappedDelta(p.x, p.y, creature.x, creature.y);
            const fa = Math.atan2(fdy, fdx);
            moveCreature(creature, creature.x + Math.cos(fa) * creature.speed, creature.y + Math.sin(fa) * creature.speed);
            continue;
        }

        // 草食/雜食：吃附近 80px 內的果子
        if (creature.diet === 'herbivore' || creature.diet === 'omnivore') {
            let closestIdx = -1;
            let closestDist = 80;
            for (let i = 0; i < gameState.fruits.length; i++) {
                const fruit = gameState.fruits[i];
                const d = wrappedDistance(creature.x, creature.y, fruit.x, fruit.y);
                if (d < closestDist) { closestDist = d; closestIdx = i; }
            }
            if (closestIdx !== -1) {
                const fruit = gameState.fruits[closestIdx];
                const { dx: fdx, dy: fdy } = wrappedDelta(creature.x, creature.y, fruit.x, fruit.y);
                const fa = Math.atan2(fdy, fdx);
                moveCreature(creature, creature.x + Math.cos(fa) * creature.speed, creature.y + Math.sin(fa) * creature.speed);
                if (closestDist < creature.radius + 6) {
                    gameState.fruits.splice(closestIdx, 1);
                    creature.fruitsEaten = (creature.fruitsEaten || 0) + 1;
                    creature.hp += 3;
                    creature.maxHp = (creature.maxHp || 30) + 3;
                    creature.speed += 0.05;
                    // 超過5顆後變激進
                    if (creature.fruitsEaten >= 5 && creature.diet !== 'aggressive') {
                        creature.diet = 'aggressive';
                        creature.damage = 8;
                        creature.aggroRange = 120;
                    }
                }
                continue;
            }
        }

        // idle/wandering：每 3 秒選新漫遊目標
        if (!creature.wanderTarget || now - creature.lastWanderTime >= 3000) {
            creature.wanderTarget = {
                x: Math.random() * (MAP_WIDTH  - 60) + 30,
                y: Math.random() * (MAP_HEIGHT - 60) + 30
            };
            creature.lastWanderTime = now;
            creature.state = 'wandering';
        }

        if (creature.wanderTarget) {
            const { dx: wdx, dy: wdy } = wrappedDelta(creature.x, creature.y, creature.wanderTarget.x, creature.wanderTarget.y);
            const dist = Math.sqrt(wdx * wdx + wdy * wdy);
            if (dist < 2) {
                creature.wanderTarget = null;
                creature.state = 'idle';
            } else {
                const wa = Math.atan2(wdy, wdx);
                moveCreature(creature, creature.x + Math.cos(wa) * creature.speed, creature.y + Math.sin(wa) * creature.speed);
            }
        }
    }
}

function drawNeutralCreatures() {
    for (const creature of gameState.neutralCreatures) {
        if (creature.hp <= 0) continue;
        const s = worldToScreen(creature.x, creature.y);
        if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) continue;

        const nBiome = getBiome(creature.x, creature.y);
        let baseC, aggrC, fleeC, fightC;
        if (nBiome === 'ocean') {
            baseC = '#4499CC'; aggrC = '#224488'; fleeC = '#88CCFF'; fightC = '#336699';
        } else if (nBiome === 'desert') {
            baseC = '#CC9944'; aggrC = '#884422'; fleeC = '#FFCC44'; fightC = '#AA6622';
        } else {
            baseC = 'orange'; aggrC = '#CC4400'; fleeC = 'yellow'; fightC = '#CC5500';
        }
        let color = baseC;
        if (creature.diet === 'aggressive') color = aggrC;
        else if (creature.state === 'fleeing') color = fleeC;
        else if (creature.state === 'fighting') color = fightC;

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, creature.radius, 0, Math.PI * 2);
        ctx.fill();

        const barW = 20, barH = 4;
        const barX = s.x - barW / 2;
        const barY = s.y - creature.radius - 8;
        ctx.fillStyle = '#555';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#00CC00';
        ctx.fillRect(barX, barY, barW * (creature.hp / (creature.maxHp || 30)), barH);
        if (creature.name) {
            ctx.save();
            ctx.shadowColor = '#000'; ctx.shadowBlur = 3;
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(creature.name, s.x, s.y - creature.radius - 10);
            ctx.restore();
        }
    }
}

// =============================================================
// 敵意生物系統 (Hostile Creatures)
// =============================================================

function moveCreature(entity, newX, newY) {
    entity.x = ((newX % MAP_WIDTH)  + MAP_WIDTH)  % MAP_WIDTH;
    entity.y = ((newY % MAP_HEIGHT) + MAP_HEIGHT) % MAP_HEIGHT;
}

function spawnHostileCreatures() {
    gameState.hostileCreatures = [];
    const GRID = 5, BLOCK = 1600; // 5x5 格，每格 1600px
    const bonus = gameState.creatureStrengthMultiplier;
    for (let gx = 0; gx < GRID; gx++) {
        for (let gy = 0; gy < GRID; gy++) { // 每格 1 隻，共 25 隻
            const x = gx * BLOCK + 50 + Math.random() * (BLOCK - 100);
            const y = gy * BLOCK + 50 + Math.random() * (BLOCK - 100);
            const roll = Math.random();
            const diet = roll < 0.8 ? 'carnivore' : (roll < 0.9 ? 'herbivore' : 'omnivore');
            gameState.hostileCreatures.push({
                x, y, radius: 10, hp: 50 + bonus * 10, maxHp: 50 + bonus * 10,
                speed: Math.min(2.5, 1.2 + bonus * 0.1),
                damage: Math.min(20, 5 + bonus), attackCooldown: 0, diet,
                state: 'patrolling', aggroRange: 150, attackRange: 20,
                wanderTarget: null, lastWanderTime: Date.now(),
                target: null, targetType: null
            });
        }
    }
    console.log("--- 敵意生物生成完成：" + gameState.hostileCreatures.length + " 隻（5x5 格，每格1隻）---");
}

function updateHostileCreatures() {
    const now = Date.now();
    const p = gameState.player;

    // 清除超過 60 秒的屍體
    gameState.corpses = gameState.corpses.filter(c => now - c.spawnTime < 60000);

    for (const creature of gameState.hostileCreatures) {
        if (creature.hp <= 0) continue;
        if (creature.stunnedUntil && now < creature.stunnedUntil) continue;

        // 尋找最近目標（玩家 > 中立生物）
        let bestTarget = null;
        let bestDist = Infinity;
        let bestType = null;

        const effectiveAggroRange = Math.max(60, creature.aggroRange - p.aggroRangeReduction);
        const distToPlayer = wrappedDistance(creature.x, creature.y, p.x, p.y);
        if (distToPlayer < effectiveAggroRange) {
            bestTarget = p;
            bestDist = distToPlayer;
            bestType = 'player';
        }

        for (const neutral of gameState.neutralCreatures) {
            if (neutral.hp <= 0) continue;
            const d = wrappedDistance(creature.x, creature.y, neutral.x, neutral.y);
            if (d < effectiveAggroRange && d < bestDist) {
                bestTarget = neutral;
                bestDist = d;
                bestType = 'neutral';
            }
        }

        // 狀態切換
        if (bestTarget !== null) {
            creature.state = 'chasing';
            creature.target = bestTarget;
            creature.targetType = bestType;
        } else if (creature.state === 'chasing') {
            const t = creature.target;
            const d = t ? wrappedDistance(creature.x, creature.y, t.x, t.y) : Infinity;
            if (!t || t.hp <= 0 || d > effectiveAggroRange + 200) {
                creature.state = 'patrolling';
                creature.target = null;
                creature.targetType = null;
            }
        }

        // 追擊與攻擊
        if (creature.state === 'chasing' && creature.target) {
            const t = creature.target;
            const { dx, dy } = wrappedDelta(creature.x, creature.y, t.x, t.y);
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist <= creature.attackRange) {
                if (now - creature.attackCooldown >= 1000) {
                    if (creature.targetType === 'player') {
                        applyDamageToPlayer(creature.damage, creature);
                    } else if (creature.targetType === 'neutral') {
                        creature.target.hp -= creature.damage;
                        if (creature.target.hp <= 0) {
                            gameState.corpses.push({
                                x: creature.target.x, y: creature.target.y,
                                radius: creature.target.radius, spawnTime: now
                            });
                            // 擊殺後回到巡邏狀態
                            creature.state = 'patrolling';
                            creature.target = null;
                            creature.targetType = null;
                        }
                    }
                    creature.attackCooldown = now;
                }
            } else {
                const angle = Math.atan2(dy, dx);
                moveCreature(creature, creature.x + Math.cos(angle) * creature.speed, creature.y + Math.sin(angle) * creature.speed);
            }
            continue;
        }

        // carnivore/omnivore 吃附近屍體
        if (creature.diet === 'carnivore' || creature.diet === 'omnivore') {
            let closestIdx = -1;
            let closestDist = creature.aggroRange;
            for (let i = 0; i < gameState.corpses.length; i++) {
                const corpse = gameState.corpses[i];
                const d = wrappedDistance(creature.x, creature.y, corpse.x, corpse.y);
                if (d < closestDist) { closestDist = d; closestIdx = i; }
            }
            if (closestIdx !== -1) {
                const corpse = gameState.corpses[closestIdx];
                if (closestDist < creature.radius + corpse.radius) {
                    creature.speed = Math.min(2.5, Math.round((creature.speed + 0.1) * 10) / 10);
                    creature.damage = Math.min(20, creature.damage + 1);
                    gameState.corpses.splice(closestIdx, 1);
                } else {
                    const { dx: cdx, dy: cdy } = wrappedDelta(creature.x, creature.y, corpse.x, corpse.y);
                    moveCreature(creature, creature.x + Math.cos(Math.atan2(cdy, cdx)) * creature.speed, creature.y + Math.sin(Math.atan2(cdy, cdx)) * creature.speed);
                    continue;
                }
            }
        }

        // patrolling：每 2 秒換漫遊目標
        if (!creature.wanderTarget || now - creature.lastWanderTime >= 2000) {
            creature.wanderTarget = {
                x: Math.random() * (MAP_WIDTH  - 60) + 30,
                y: Math.random() * (MAP_HEIGHT - 60) + 30
            };
            creature.lastWanderTime = now;
        }

        if (creature.wanderTarget) {
            const { dx: wdx, dy: wdy } = wrappedDelta(creature.x, creature.y, creature.wanderTarget.x, creature.wanderTarget.y);
            const dist = Math.sqrt(wdx * wdx + wdy * wdy);
            if (dist < 2) {
                creature.wanderTarget = null;
            } else {
                const wa = Math.atan2(wdy, wdx);
                moveCreature(creature, creature.x + Math.cos(wa) * creature.speed, creature.y + Math.sin(wa) * creature.speed);
            }
        }
    }
}

function drawCorpses() {
    for (const corpse of gameState.corpses) {
        const s = worldToScreen(corpse.x, corpse.y);
        if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) continue;
        ctx.fillStyle = '#888';
        ctx.beginPath();
        ctx.arc(s.x, s.y, corpse.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawHostileCreatures() {
    for (const creature of gameState.hostileCreatures) {
        if (creature.hp <= 0) continue;
        const s = worldToScreen(creature.x, creature.y);
        if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) continue;

        const hBiome = getBiome(creature.x, creature.y);
        const hNormalC  = hBiome === 'ocean' ? '#CC4466' : (hBiome === 'desert' ? '#CC8800' : 'red');
        const hChasingC = hBiome === 'ocean' ? '#882244' : (hBiome === 'desert' ? '#885500' : '#8B0000');
        ctx.fillStyle = creature.state === 'chasing' ? hChasingC : hNormalC;
        ctx.beginPath();
        ctx.arc(s.x, s.y, creature.radius, 0, Math.PI * 2);
        ctx.fill();

        const barW = 20, barH = 4;
        const barX = s.x - barW / 2;
        const barY = s.y - creature.radius - 8;
        ctx.fillStyle = '#550000';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#00CC00';
        ctx.fillRect(barX, barY, barW * (creature.hp / (creature.maxHp || 50)), barH);
        if (creature.name) {
            ctx.save();
            ctx.shadowColor = '#000'; ctx.shadowBlur = 3;
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(creature.name, s.x, s.y - creature.radius - 10);
            ctx.restore();
        }
    }
}

// =============================================================
// 器官系統 (Organ System)
// =============================================================

function applyDamageToPlayer(rawDamage, attacker) {
    const p = gameState.player;
    const final = Math.max(1, Math.round(rawDamage * (1 - p.damageReduction)));
    gameState.stats.hpCurrent = Math.max(0, gameState.stats.hpCurrent - final);
    AudioManager.play('hurt');
    if (p.thornDamage > 0 && attacker && attacker.hp > 0) {
        const thornMult = p.comboShellArmor ? 2 : 1; // 龜殼+刺甲組合：反傷翻倍
        let thornTotal = Math.round(final * p.thornDamage * thornMult);
        if (p.thornPlayerAtkReflect) thornTotal += Math.round(p.attack * 0.05);
        attacker.hp -= thornTotal;
        if (attacker.hp <= 0) {
            if (attacker === gameState.boss) {
                showVictory();
            } else if (attacker === gameState.eliteCreature) {
                handleEliteKill(attacker);
            } else {
                const isHostile = gameState.hostileCreatures.includes(attacker);
                handleKill(attacker, isHostile);
            }
        }
    }
    if (gameState.stats.hpCurrent <= 0) {
        const tenacityLevel = gameState.playerSkills.tenacity || 0;
        if (tenacityLevel > 0 && !p.tenacityUsed) {
            // 頑強意志：每局觸發一次，保留 10%×等級的 HP
            gameState.stats.hpCurrent = Math.max(1, Math.ceil(gameState.stats.hpMax * 0.1 * tenacityLevel));
            p.tenacityUsed = true;
            showFloatingText(p.x, p.y - 40, '頑強意志！', '#FF8800');
            return;
        }
        showSkillTree();
    }
}

// 取得玩家裝備的某器官等級（0=未裝備）
function getOrganLevel(id) {
    const o = gameState.player.organs.find(o => o.id === id);
    return o ? o.level : 0;
}

// 累加某器官從1級到當前等級的指定效果值
function getOrganCumulative(id, effectKey) {
    const lv = getOrganLevel(id);
    if (!lv || !ORGANS[id]) return 0;
    return ORGANS[id].levels.slice(0, lv).reduce((sum, l) => sum + (l.effects[effectKey] || 0), 0);
}

// 若玩家持有組合所需的其中一個器官，回傳該組合描述
function getComboHint(organId) {
    for (const combo of COMBOS) {
        if (!combo.ids.includes(organId)) continue;
        const partner = combo.ids.find(id => id !== organId);
        if (gameState.player.organs.some(o => o.id === partner)) return combo.desc;
    }
    return null;
}

function checkComboEffects() {
    const p = gameState.player;
    const has = id => p.organs.some(o => o.id === id);
    for (const combo of COMBOS) {
        p[combo.key] = combo.ids.every(id => has(id));
    }
}

function getOrganSlotsUsed() {
    return gameState.player.organs.reduce((sum, o) => sum + (o.level || 1), 0);
}

function applyHiddenOrganEffects(organ) {
    const p = gameState.player;
    const fx = organ.effects || {};
    if (fx.speedAdd)       p.speed = Math.max(0.3, p.speed + fx.speedAdd);
    if (fx.attackAdd)      p.attack += fx.attackAdd;
    if (fx.hpMaxAdd) {
        gameState.stats.hpMax += fx.hpMaxAdd;
        gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + fx.hpMaxAdd);
    }
    if (fx.radiusAdd) {
        const rangeIncrease = Math.round(fx.radiusAdd / p.radius * p.attackRange);
        p.radius += fx.radiusAdd;
        p.attackRange += rangeIncrease;
    }
    if (fx.pickupRangeAdd) p.pickupRange += fx.pickupRangeAdd;
}

// 套用器官第 organ.level 級的增量效果
function applyOrganEffects(organ) {
    const p = gameState.player;
    const def = ORGANS[organ.id];
    if (!def) return;
    const lv = def.levels[organ.level - 1];
    if (!lv) return;
    const fx = lv.effects;

    if (fx.attackAdd)              p.attack += fx.attackAdd;
    if (fx.attackSpeedMult)        p.attackSpeed *= fx.attackSpeedMult;
    if (fx.speedAdd)               p.speed = Math.max(0.3, p.speed + fx.speedAdd);
    if (fx.damageReductionAdd)     p.damageReduction = Math.min(0.9, p.damageReduction + fx.damageReductionAdd);
    if (fx.hpMaxAdd) {
        gameState.stats.hpMax += fx.hpMaxAdd;
        gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + fx.hpMaxAdd);
    }
    if (fx.radiusAdd) {
        const rangeIncrease = Math.round(fx.radiusAdd / p.radius * p.attackRange);
        p.radius += fx.radiusAdd;
        p.attackRange += rangeIncrease;
    }
    if (fx.thornDamageAdd)         p.thornDamage += fx.thornDamageAdd;
    if (fx.thornPlayerAtkReflect)  p.thornPlayerAtkReflect = true;
    if (fx.critChanceAdd)          p.critChance += fx.critChanceAdd;
    if (fx.critMultiplierAdd)      p.critMultiplier += fx.critMultiplierAdd;
    if (fx.brainActivate) { p.brainActive = true; p.brainTimer = Date.now(); }
    if (fx.brainIntervalDelta)     p.brainInterval = Math.max(1000, p.brainInterval + fx.brainIntervalDelta);
    if (fx.brainRangeDelta)        p.brainRange += fx.brainRangeDelta;
    if (fx.brainDmgDelta)          p.brainDmg += fx.brainDmgDelta;
    if (fx.pickupRangeAdd)         p.pickupRange += fx.pickupRangeAdd;
    if (fx.attackRangeAdd)         p.attackRange += fx.attackRangeAdd;
    if (fx.aggroRangeReductionAdd) p.aggroRangeReduction += fx.aggroRangeReductionAdd;
    if (fx.regenHpAdd)             p.naturalRegenHp += fx.regenHpAdd;
    if (fx.regenIntervalDelta)     p.naturalRegenInterval = Math.max(2000, p.naturalRegenInterval + fx.regenIntervalDelta);

    checkComboEffects();
}

function checkOrganUpgrade() {
    const p = gameState.player;
    if (p.organs.length >= p.nextEvolutionAt) {
        p.organSlots      += 3;
        p.nextEvolutionAt += 3;
        console.log('進化！器官槽位增加至 ' + p.organSlots);
    }
}

function spawnTreasure() {
    gameState.treasures.push({
        x: Math.random() * (MAP_WIDTH  - 60) + 30,
        y: Math.random() * (MAP_HEIGHT - 60) + 30,
        radius: 8
    });
}

function checkTreasureCollision() {
    const p = gameState.player;
    for (let i = gameState.treasures.length - 1; i >= 0; i--) {
        const t = gameState.treasures[i];
        if (wrappedDistance(p.x, p.y, t.x, t.y) < p.radius + t.radius) {
            addXP(50);
            showXPPopup(p.x, p.y, 50);
            gameState.treasures.splice(i, 1);
        }
    }
}

function updatePassiveOrgans() {
    const now = Date.now();
    const p = gameState.player;

    // 大腦：念力波（等級化範圍/間隔/傷害）
    if (p.brainActive && now - p.brainTimer >= p.brainInterval) {
        p.brainTimer = now;
        for (const c of gameState.hostileCreatures) {
            if (c.hp <= 0) continue;
            if (wrappedDistance(p.x, p.y, c.x, c.y) <= p.brainRange) {
                let dmg = p.brainDmg;
                let isCrit = false;
                // 大腦+真視之眼組合：念力波可暴擊
                if (p.comboBrainEye && p.critChance > 0 && Math.random() < p.critChance) {
                    dmg = Math.round(dmg * p.critMultiplier);
                    isCrit = true;
                }
                c.hp -= dmg;
                showFloatingText(c.x, c.y - 15, (isCrit ? '⚡' : '') + dmg, isCrit ? '#FFD700' : '#FFAAAA');
                if (c.hp <= 0) {
                    gameState.corpses.push({ x: c.x, y: c.y, radius: c.radius, spawnTime: now });
                    addXP(30 + (gameState.playerSkills.hunter || 0) * 10);
                }
            }
        }
    }

    // 超自然回復
    if (p.naturalRegenHp > 0) {
        if (!p.naturalRegenTimer) p.naturalRegenTimer = now;
        let interval = p.naturalRegenInterval;
        if (p.comboSkinRegen) interval = Math.max(1000, interval - 1000); // 厚皮+超自然回復：間隔再-1秒
        if (now - p.naturalRegenTimer >= interval) {
            p.naturalRegenTimer = now;
            const amt = p.naturalRegenHp + (p.comboSkinRegen ? 1 : 0);
            gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + amt);
            showFloatingText(p.x, p.y - 30, '+' + amt + ' HP', '#00FF88');
        }
    }
}

function checkXPMilestone() {
    if (gameState.organSelectionActive) return;
    if (gameState.stats.xpCurrent >= gameState.xpThreshold) {
        showOrganSelection();
    }
}

function showOrganSelection() {
    if (gameState.organSelectionActive) {
        gameState.pendingOrganSelections++;
        return;
    }
    const p = gameState.player;
    gameState.organSelectionActive = true;

    const organSlotsUsed = getOrganSlotsUsed();
    const slotsFull = organSlotsUsed >= p.organSlots;
    const typeColor = { attack: '#FF9999', defense: '#88CCFF', spirit: '#CC99FF' };

    const evoOptions = slotsFull ? checkEvolutionUnlock() : [];

    const closeOverlay = () => {
        const el = document.getElementById('organ-selection-overlay');
        if (el) el.remove();
        gameState.organSelectionActive = false;
        gameState.lastTimeTick = Date.now();
        if (gameState.pendingOrganSelections > 0) {
            gameState.pendingOrganSelections--;
            showOrganSelection();
        }
    };

    // 生成一般器官選項（不含隱藏器官）
    function generateOrganOptions() {
        const opts = [];
        p.organs
            .filter(o => ORGANS[o.id] && o.level < ORGANS[o.id].maxLevel)
            .forEach(o => opts.push({ type: 'upgrade', def: ORGANS[o.id], existingOrgan: o }));
        const equippedIds = p.organs.map(o => o.id);
        Object.values(ORGANS)
            .filter(def => !equippedIds.includes(def.id))
            .sort(() => Math.random() - 0.5)
            .forEach(def => opts.push({ type: 'new', def }));
        opts.sort(() => Math.random() - 0.5);
        opts.splice(3);
        // 新手保護：Lv1~3 且完全沒有攻擊器官時，強制至少1個攻擊選項
        if (p.level <= 3 && !p.organs.some(o => ORGANS[o.id] && ORGANS[o.id].type === 'attack')) {
            if (!opts.some(opt => opt.def.type === 'attack')) {
                const eIds = p.organs.map(o => o.id);
                const atkPool = Object.values(ORGANS).filter(def => def.type === 'attack' && !eIds.includes(def.id));
                if (atkPool.length > 0) opts[0] = { type: 'new', def: atkPool[Math.floor(Math.random() * atkPool.length)] };
            }
        }
        return opts;
    }

    if (!slotsFull && generateOrganOptions().length === 0 && evoOptions.length === 0) {
        gameState.organSelectionActive = false;
        return;
    }

    const overlay = document.createElement('div');
    overlay.id = 'organ-selection-overlay';
    overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.78);overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;z-index:100;pointer-events:all;box-sizing:border-box;';

    const title = document.createElement('div');
    title.style.cssText = 'color:#FFD700;font-size:22px;font-weight:bold;margin-bottom:6px;text-shadow:1px 1px 4px black;';
    title.textContent = slotsFull ? '✦ 選擇進化路線 ✦' : '✦ 選擇器官或升級 ✦';
    overlay.appendChild(title);

    const slotInfo = document.createElement('div');
    slotInfo.style.cssText = 'color:#aaa;font-size:13px;margin-bottom:14px;';
    slotInfo.textContent = '槽位：' + organSlotsUsed + ' / ' + p.organSlots;
    overlay.appendChild(slotInfo);

    // 選項容器（支援幸運重選動態更新）
    const optionsContainer = document.createElement('div');
    optionsContainer.style.cssText = 'display:flex;flex-direction:column;align-items:center;width:100%;';
    overlay.appendChild(optionsContainer);

    function renderOptions(organOptions) {
        optionsContainer.innerHTML = '';

        // ── 器官/升級選項
        organOptions.forEach(opt => {
            const { def, type, existingOrgan } = opt;
            const color = typeColor[def.type] || '#FFD700';
            const isUpgrade = type === 'upgrade';
            const targetLevel = isUpgrade ? existingOrgan.level + 1 : 1;
            const lvDesc = def.levels[targetLevel - 1].desc;
            const comboHint = getComboHint(def.id);

            const btn = document.createElement('div');
            btn.style.cssText = 'background:rgba(255,255,255,0.08);border:1px solid ' + (isUpgrade ? '#FFAA44' : '#666') + ';color:white;padding:12px 20px;margin:5px;cursor:pointer;border-radius:6px;width:380px;text-align:center;';
            btn.innerHTML =
                '<div style="color:' + color + ';font-weight:bold;font-size:15px;">' +
                    def.name + (isUpgrade ? ' Lv.' + existingOrgan.level + ' → Lv.' + targetLevel : ' Lv.1') +
                '</div>' +
                '<div style="font-size:11px;color:#ccc;margin-top:4px;">' + lvDesc + '</div>' +
                (comboHint ? '<div style="font-size:10px;color:#FFD700;margin-top:5px;">⚡ 組合效果：' + comboHint + '</div>' : '');
            btn.onmouseenter = () => { btn.style.background = 'rgba(255,255,255,0.2)'; };
            btn.onmouseleave = () => { btn.style.background = 'rgba(255,255,255,0.08)'; };
            btn.onclick = () => {
                if (isUpgrade) {
                    existingOrgan.level = targetLevel;
                    existingOrgan.desc = def.levels[targetLevel - 1].desc;
                } else {
                    p.organs.push({ id: def.id, name: def.name, type: def.type, level: 1, desc: def.levels[0].desc });
                }
                applyOrganEffects(isUpgrade ? existingOrgan : p.organs[p.organs.length - 1]);
                closeOverlay();
            };
            optionsContainer.appendChild(btn);
        });

        // ── 進化路線
        evoOptions.forEach(opt => {
            const path = EVOLUTION_PATHS[opt.type];
            const lvData = path.levels[opt.nextLevel - 1];
            const btn = document.createElement('div');
            btn.style.cssText = 'background:rgba(255,215,0,0.08);border:1px solid #FFD700;color:white;padding:12px 20px;margin:5px;cursor:pointer;border-radius:6px;width:380px;text-align:center;';
            btn.innerHTML = '<strong style="color:#FFD700;font-size:16px;">' + path.icon + ' ' + path.name + ' Lv.' + opt.nextLevel + '</strong><br><span style="font-size:12px;color:#ccc;">' + lvData.desc + '</span>';
            btn.onmouseenter = () => { btn.style.background = 'rgba(255,215,0,0.2)'; };
            btn.onmouseleave = () => { btn.style.background = 'rgba(255,215,0,0.08)'; };
            btn.onclick = () => {
                applyEvolutionLevelEffect(opt.type, opt.nextLevel);
                closeOverlay();
            };
            optionsContainer.appendChild(btn);
        });

        // ── 幸運重選按鈕（非進化狀態且技能等級 > 0 時顯示；次數耗盡變灰）
        if (!slotsFull && (gameState.playerSkills.luckyReroll || 0) > 0) {
            const remaining = gameState.player.rerollsRemaining || 0;
            const canReroll = remaining > 0;
            const rerollBtn = document.createElement('div');
            rerollBtn.style.cssText = 'padding:8px 20px;margin:10px 5px 5px;border-radius:6px;width:380px;text-align:center;font-size:13px;' +
                (canReroll
                    ? 'background:rgba(100,200,255,0.1);border:1px solid #66CCFF;color:#66CCFF;cursor:pointer;'
                    : 'background:rgba(80,80,80,0.1);border:1px solid #555;color:#555;cursor:default;');
            rerollBtn.textContent = '🎲 重新隨機（剩餘 ' + remaining + ' 次）';
            if (canReroll) {
                rerollBtn.onmouseenter = () => { rerollBtn.style.background = 'rgba(100,200,255,0.25)'; };
                rerollBtn.onmouseleave = () => { rerollBtn.style.background = 'rgba(100,200,255,0.1)'; };
                rerollBtn.onclick = () => {
                    gameState.player.rerollsRemaining--;
                    renderOptions(generateOrganOptions());
                };
            }
            optionsContainer.appendChild(rerollBtn);
        }
    }

    renderOptions(slotsFull ? [] : generateOrganOptions());
    document.getElementById('game-container').appendChild(overlay);
}

function drawTreasures() {
    for (const t of gameState.treasures) {
        const s = worldToScreen(t.x, t.y);
        if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) continue;
        ctx.fillStyle = 'gold';
        ctx.beginPath();
        ctx.arc(s.x, s.y, t.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#CC8800';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.lineWidth = 1;
    }
}

function drawOrganUI() {
    const organs = gameState.player.organs;
    const hiddenOrgans = gameState.player.hiddenOrgans || [];
    const ev = gameState.player.evolution;
    const p = gameState.player;
    const lineH = 18;
    const padX = 10;
    const padY = 8;
    const H = VIEW_H;
    const versionAreaH = 46;

    const organSlotsUsed = getOrganSlotsUsed();

    // 收集所有已解鎖的進化路線（等級 > 0），依 herbivore→carnivore→omnivore 順序
    const evoEntries = Object.entries(EVOLUTION_PATHS)
        .filter(([key]) => (ev[key] || 0) > 0)
        .map(([key, path]) => path.icon + ' ' + path.name + ' Lv.' + ev[key]);

    const evoCnt = evoEntries.length;
    const evoBoxH = evoCnt > 0 ? evoCnt * lineH + padY * 2 : 0;
    // 器官框：槽位行 + 一般器官 + 分隔（若有隱藏器官）+ 隱藏器官
    const hiddenRows = hiddenOrgans.length > 0 ? hiddenOrgans.length + 1 : 0;
    const organsBoxH = (1 + organs.length + hiddenRows) * lineH + padY * 2;

    // 由底部往上排：版本區 → 器官框 → 4px 間距 → 進化框
    const boxBottom = H - versionAreaH;
    const boxY      = boxBottom - organsBoxH;
    const evoBoxY   = boxY - 4 - evoBoxH;

    // 繪製進化框（多行）
    if (evoCnt > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(padX - 4, evoBoxY, 164, evoBoxH);
        ctx.font = '13px Arial';
        ctx.fillStyle = '#88FF88';
        evoEntries.forEach((text, i) => {
            ctx.fillText(text, padX, evoBoxY + padY + (i + 1) * lineH - 4);
        });
    }

    // 繪製器官框（槽位行 + 器官清單 + 隱藏器官）
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX - 4, boxY, 164, organsBoxH);
    ctx.font = '13px Arial';

    // 第一行：槽位狀態（用等級總和計算）
    const isFull = organSlotsUsed >= p.organSlots;
    ctx.fillStyle = isFull ? '#FFD700' : '#CCCCCC';
    const slotText = '器官：' + organSlotsUsed + ' / ' + p.organSlots + (isFull ? ' ✨可進化' : '');
    ctx.fillText(slotText, padX, boxY + padY + lineH - 4);

    // 後續行：一般器官清單
    const typeColor = { attack: '#FF9999', defense: '#88CCFF', spirit: '#CC99FF' };
    organs.forEach((organ, i) => {
        ctx.fillStyle = typeColor[organ.type] || '#FFD700';
        const label = '▸ ' + organ.name + ' Lv.' + (organ.level || 1) + (organ.inherited ? '（繼承）' : '');
        ctx.fillText(label, padX, boxY + padY + (i + 2) * lineH - 4);
    });

    // 隱藏器官（金色，底部）
    if (hiddenOrgans.length > 0) {
        const sepRow = organs.length + 2;
        ctx.fillStyle = 'rgba(255,215,0,0.5)';
        ctx.fillRect(padX - 2, boxY + padY + sepRow * lineH - 14, 160, 1);
        hiddenOrgans.forEach((organ, i) => {
            ctx.fillStyle = '#FFD700';
            ctx.fillText('✨ ' + organ.name, padX, boxY + padY + (sepRow + i + 1) * lineH - 4);
        });
    }
}

function showFloatingText(wx, wy, text, color, fontSize) {
    const s = worldToScreen(wx, wy);
    if (s.x < -30 || s.x > VIEW_W + 30 || s.y < -30 || s.y > VIEW_H + 30) return;
    const el = document.createElement('div');
    const fz = fontSize || 16;
    el.style.cssText = 'position:absolute;pointer-events:none;font-size:' + fz + 'px;font-weight:bold;animation:fadeOutUp 0.8s forwards;text-shadow:1px 1px 2px black;';
    el.style.left = (s.x - 20) + 'px';
    el.style.top  = (s.y - 10) + 'px';
    el.style.color = color || 'white';
    el.innerText = text;
    document.getElementById('ui-overlay').appendChild(el);
    setTimeout(() => el.remove(), 800);
}

function handleKill(c, isHostile) {
    const p = gameState.player;
    gameState.corpses.push({ x: c.x, y: c.y, radius: c.radius, spawnTime: Date.now() });
    const baseXP = isHostile ? Math.min(80, 30 + Math.round(((c.maxHp || 50) / 50) * 50)) : 20;
    const xp = baseXP + (gameState.playerSkills.hunter || 0) * 10;
    addXP(xp);
    showXPPopup(p.x, p.y, xp);
}

function playerAttack() {
    const p = gameState.player;
    const now = Date.now();
    const cooldownMs = Math.round(1000 / p.attackSpeed);
    if (now - p.attackTimer < cooldownMs) return;
    p.attackTimer = now;

    if (p.attack <= 0) {
        showFloatingText(p.x, p.y - 30, '沒有攻擊器官！', '#FF8800');
        return;
    }

    p.attackVisual = now;

    const targets = [
        ...gameState.hostileCreatures.map(c => ({ c, hostile: true, isBoss: false, isElite: false })),
        ...gameState.neutralCreatures.map(c => ({ c, hostile: false, isBoss: false, isElite: false })),
        ...(gameState.boss && gameState.boss.hp > 0 ? [{ c: gameState.boss, hostile: true, isBoss: true, isElite: false }] : []),
        ...(gameState.eliteCreature && gameState.eliteCreature.hp > 0 ? [{ c: gameState.eliteCreature, hostile: true, isBoss: false, isElite: true }] : [])
    ];

    let anyHit = false, anyCrit = false, bossDied = false;

    for (const { c, hostile, isBoss, isElite } of targets) {
        if (c.hp <= 0) continue;
        if (wrappedDistance(p.x, p.y, c.x, c.y) > p.attackRange) continue;

        let dmg = p.attack;
        let isCrit = false;
        if (p.critChance > 0 && Math.random() < p.critChance) {
            dmg = Math.round(dmg * p.critMultiplier);
            isCrit = true;
        }
        anyHit = true;
        if (isCrit) anyCrit = true;

        const hpBefore = c.hp;
        c.hp -= dmg;
        showFloatingText(c.x, c.y - 15, (isCrit ? '⚡' : '') + dmg, isCrit ? '#FFD700' : '#FF4444');

        // 蟹鉗：等級化流血
        const crabLv = getOrganLevel('crabClaw');
        if (crabLv > 0) {
            const bleedChance = getOrganCumulative('crabClaw', 'bleedChance');
            if (Math.random() < bleedChance) {
                const baseDmg = getOrganCumulative('crabClaw', 'bleedDmg');
                c.bleedEndTime = now + getOrganCumulative('crabClaw', 'bleedDur');
                c.bleedDmg = p.comboCrabPoison ? baseDmg * 2 : baseDmg;
                c.lastBleedTick = now;
            }
        }

        // 毒刺：等級化中毒
        const poisonLv = getOrganLevel('poisonStinger');
        if (poisonLv > 0) {
            const basePoisonDmg = getOrganCumulative('poisonStinger', 'poisonDmg');
            c.poisonEndTime = now + getOrganCumulative('poisonStinger', 'poisonDur');
            c.poisonDmg = p.comboCrabPoison ? basePoisonDmg * 2 : basePoisonDmg;
            c.lastPoisonTick = now;
        }

        // 獠牙：等級化暈眩；真視之眼+獠牙組合：暴擊也觸發暈眩
        const fangLv = getOrganLevel('fang');
        if (fangLv > 0) {
            const stunChance = getOrganCumulative('fang', 'stunChance');
            if (Math.random() < stunChance || (p.comboEyeFang && isCrit)) {
                c.stunnedUntil = now + ORGANS.fang.levels[0].effects.stunDur;
            }
        }

        if (!hostile && !isElite) {
            c.state = c.canFight ? 'fighting' : 'fleeing';
        }

        if (c.hp <= 0) {
            if (isBoss) { bossDied = true; continue; }
            if (isElite) { handleEliteKill(c); continue; }
            handleKill(c, hostile);
        }
    }

    if (anyHit) AudioManager.play(anyCrit ? 'attackCrit' : 'attackNormal');
    if (bossDied) showVictory();
}

function updateStatusEffects() {
    const now = Date.now();
    const eliteArr = (gameState.eliteCreature && gameState.eliteCreature.hp > 0) ? [gameState.eliteCreature] : [];
    for (const c of [...gameState.hostileCreatures, ...gameState.neutralCreatures, ...eliteArr]) {
        if (c.hp <= 0) continue;
        const isElite = c === gameState.eliteCreature;
        const isHostile = gameState.hostileCreatures.includes(c);

        if (c.bleedEndTime && now < c.bleedEndTime && now - (c.lastBleedTick || 0) >= 1000) {
            const bleedAmt = c.bleedDmg || 1;
            const hpBefore = c.hp;
            c.hp -= bleedAmt;
            c.lastBleedTick = now;
            showFloatingText(c.x, c.y - 18, '血 -' + bleedAmt, '#880000', 11);
            if (hpBefore > 0 && c.hp <= 0) {
                if (isElite) handleEliteKill(c);
                else handleKill(c, isHostile);
            }
        }

        if (c.poisonEndTime && now < c.poisonEndTime && now - (c.lastPoisonTick || 0) >= 1000) {
            const poisonAmt = c.poisonDmg || 2;
            const hpBefore = c.hp;
            c.hp -= poisonAmt;
            c.lastPoisonTick = now;
            showFloatingText(c.x, c.y - 18, '毒 -' + poisonAmt, '#8800CC', 11);
            if (hpBefore > 0 && c.hp <= 0) {
                if (isElite) handleEliteKill(c);
                else handleKill(c, isHostile);
            }
        }
    }
}
