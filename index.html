// 進化系統
// =============================================================

function checkEvolutionUnlock() {
    const ev = gameState.player.evolution;
    const opts = [];
    // 草食性：無條件解鎖，未滿級可升
    if (ev.herbivore < 3) opts.push({ type: 'herbivore', nextLevel: ev.herbivore + 1 });
    // 肉食性：需草食 >= 1
    if (ev.herbivore >= 1 && ev.carnivore < 3) opts.push({ type: 'carnivore', nextLevel: ev.carnivore + 1 });
    // 雜食性：需草食 >= nextLevel 且 肉食 >= nextLevel
    const omnNext = ev.omnivore + 1;
    if (omnNext <= 3 && ev.herbivore >= omnNext && ev.carnivore >= omnNext) {
        opts.push({ type: 'omnivore', nextLevel: omnNext });
    }
    return opts;
}

function applyEvolutionLevelEffect(type, newLevel) {
    // 套用單次進化升級的增量效果，並擴充器官槽位
    const p = gameState.player;
    const lvData = EVOLUTION_PATHS[type].levels[newLevel - 1];
    if (type === 'herbivore') {
        gameState.stats.hpMax += lvData.hpBonus;
        gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + lvData.hpBonus);
    } else if (type === 'carnivore') {
        p.attack += lvData.attackBonus;
    } else if (type === 'omnivore') {
        p.speed += lvData.speedBonus;
    }
    p.organSlots += 3;
    p.evolution[type] = newLevel;
    if (p.evolution.omnivore > 0) p.evolution.active = 'omnivore';
    else if (p.evolution.carnivore > 0) p.evolution.active = 'carnivore';
    else p.evolution.active = 'herbivore';
}

function applyEvolutionEffects() {
    // 遊戲開始時套用當前進化等級的全量效果（初始只有草食 Lv1）
    const ev = gameState.player.evolution;
    const p = gameState.player;
    for (let i = 0; i < ev.herbivore; i++) gameState.stats.hpMax += EVOLUTION_PATHS.herbivore.levels[i].hpBonus;
    for (let i = 0; i < ev.carnivore; i++) p.attack += EVOLUTION_PATHS.carnivore.levels[i].attackBonus;
    for (let i = 0; i < ev.omnivore;  i++) p.speed  += EVOLUTION_PATHS.omnivore.levels[i].speedBonus;
    gameState.stats.hpCurrent = gameState.stats.hpMax;
    if (ev.omnivore > 0) ev.active = 'omnivore';
    else if (ev.carnivore > 0) ev.active = 'carnivore';
    else ev.active = 'herbivore';
}

function updateCorpseEating() {
    const p = gameState.player;
    const ev = p.evolution;
    if (ev.carnivore === 0) return;

    const lvData = EVOLUTION_PATHS.carnivore.levels[ev.carnivore - 1];
    const totalTime = lvData.eatTime;
    const baseXP    = EVOLUTION_PATHS.carnivore.levels[0].eatXP; // 固定Lv1基準，各等級速度不同但總XP相同
    const bonusXP   = ev.omnivore > 0 ? EVOLUTION_PATHS.omnivore.levels[ev.omnivore - 1].corpseXPBonus : 0;
    const totalXP   = baseXP + bonusXP;
    const totalHp   = 3.0; // 固定總回血（與Lv1：6次×0.5一致）
    const tickInterval = 500;
    const numTicks     = totalTime / tickInterval;
    const xpPerTick    = totalXP / numTicks;
    const hpPerTick    = totalHp / numTicks;
    const now = Date.now();

    for (let i = gameState.corpses.length - 1; i >= 0; i--) {
        const corpse = gameState.corpses[i];
        const inRange = wrappedDistance(p.x, p.y, corpse.x, corpse.y) < p.radius + (corpse.radius || 8) + 5 + p.pickupRange;

        if (inRange) {
            if (!corpse.lastEatTick) corpse.lastEatTick = now;
            if (corpse.eatProgress == null) corpse.eatProgress = 0;
            if (corpse.xpBuffer == null) corpse.xpBuffer = 0;

            if (now - corpse.lastEatTick >= tickInterval) {
                corpse.lastEatTick = now;
                corpse.eatProgress = Math.min(1, corpse.eatProgress + 1 / numTicks);
                corpse.xpBuffer += xpPerTick;

                const giveXP = corpse.eatProgress >= 1
                    ? Math.round(corpse.xpBuffer)
                    : Math.floor(corpse.xpBuffer);
                if (giveXP > 0) {
                    corpse.xpBuffer -= giveXP;
                    addXP(giveXP);
                    showFloatingText(corpse.x, corpse.y - 15, '+' + giveXP + ' XP', '#00CC44');
                }

                gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + hpPerTick);
                showFloatingText(corpse.x, corpse.y - 28, '+' + hpPerTick.toFixed(1) + ' HP', '#FF88AA');

                if (corpse.eatProgress >= 1) {
                    if (ev.omnivore >= 3 && Math.random() < 0.1) {
                        gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + 5);
                        showFloatingText(p.x, p.y - 50, '飽食！HP+5', '#00FF88');
                    }
                    gameState.corpses.splice(i, 1);
                }
            }
        } else {
            corpse.lastEatTick = null;
        }
    }
}

function drawCorpseEatingBars() {
    for (const corpse of gameState.corpses) {
        if (corpse.eatProgress == null || corpse.eatProgress <= 0) continue;
        const s = worldToScreen(corpse.x, corpse.y);
        if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) continue;
        const prog = corpse.eatProgress;
        const barW = 30, barH = 4;
        const barX = s.x - barW / 2;
        const barY = s.y - (corpse.radius || 8) - 10;
        ctx.fillStyle = '#222';
        ctx.fillRect(barX, barY, barW, barH);
        const r = Math.round(255 - 127 * prog);
        const g = Math.round(165 - 165 * prog);
        ctx.fillStyle = 'rgb(' + r + ',' + g + ',0)';
        ctx.fillRect(barX, barY, barW * (1 - prog), barH);
    }
}

// =============================================================
// 音效與設定系統
// =============================================================

function initAudio() {
    AudioManager.init();
    AudioManager.playMusic('morningTheme');
}

function loadSettings() {
    try {
        const saved = localStorage.getItem('gameSettings');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.volume) Object.assign(gameState.settings.volume, parsed.volume);
            if (parsed.keys)   Object.assign(gameState.settings.keys,   parsed.keys);
        }
    } catch(e) {}
}

function saveSettings() {
    localStorage.setItem('gameSettings', JSON.stringify(gameState.settings));
}

function _keyDisplay(k) {
    if (k === ' ') return 'Space';
    if (k === 'mouseleft') return '滑鼠左鍵';
    return k.length === 1 ? k.toUpperCase() : k.charAt(0).toUpperCase() + k.slice(1);
}

function _buildSettingsSection(title) {
    const sec = document.createElement('div');
    sec.style.cssText = 'border:1px solid #333;border-radius:6px;padding:12px 16px;margin-bottom:14px;';
    const h = document.createElement('div');
    h.style.cssText = 'font-size:14px;font-weight:bold;color:#FFD700;margin-bottom:10px;';
    h.textContent = title;
    sec.appendChild(h);
    return sec;
}

function showSettings() {
    if (document.getElementById('settings-overlay')) return;
    gameState.settingsOpen = true;

    const overlay = document.createElement('div');
    overlay.id = 'settings-overlay';
    overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;z-index:150;pointer-events:all;';

    const panel = document.createElement('div');
    panel.style.cssText = 'background:#1c1c1c;border:1px solid #444;border-radius:10px;padding:24px 28px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;color:white;font-family:Arial,sans-serif;box-sizing:border-box;';

    const titleEl = document.createElement('div');
    titleEl.style.cssText = 'font-size:22px;font-weight:bold;text-align:center;margin-bottom:18px;';
    titleEl.textContent = '⚙️ 設定';
    panel.appendChild(titleEl);

    // ─── 音量設定 ───
    const volSec = _buildSettingsSection('音量設定');
    [{ label: '總音量', vk: 'master', ok: 'masterOn' },
     { label: '音樂音量', vk: 'music',  ok: 'musicOn'  },
     { label: '音效音量', vk: 'sfx',    ok: 'sfxOn'    }].forEach(({ label, vk, ok }) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';
        const tog = document.createElement('button');
        tog.style.cssText = 'width:42px;height:22px;border-radius:11px;cursor:pointer;font-size:11px;border:none;flex-shrink:0;';
        const refreshTog = () => {
            const on = gameState.settings.volume[ok];
            tog.textContent = on ? '開' : '關';
            tog.style.background = on ? '#2a8a2a' : '#555';
        };
        refreshTog();
        tog.onclick = () => { gameState.settings.volume[ok] = !gameState.settings.volume[ok]; refreshTog(); AudioManager.refreshMusicVolume(); saveSettings(); };
        row.appendChild(tog);
        const lbl = document.createElement('div');
        lbl.style.cssText = 'min-width:68px;font-size:13px;'; lbl.textContent = label;
        row.appendChild(lbl);
        const slider = document.createElement('input');
        slider.type = 'range'; slider.min = 0; slider.max = 100; slider.step = 10;
        slider.value = gameState.settings.volume[vk];
        slider.style.cssText = 'flex:1;cursor:pointer;';
        const valLbl = document.createElement('div');
        valLbl.style.cssText = 'min-width:36px;text-align:right;font-size:13px;';
        valLbl.textContent = slider.value + '%';
        slider.oninput = () => { gameState.settings.volume[vk] = parseInt(slider.value); valLbl.textContent = slider.value + '%'; AudioManager.refreshMusicVolume(); saveSettings(); };
        row.appendChild(slider); row.appendChild(valLbl);
        volSec.appendChild(row);
    });
    panel.appendChild(volSec);

    // ─── 按鍵設定 ───
    const keySec = _buildSettingsSection('按鍵設定');
    const keyDefs = [
        { label: '移動上', sk: 'up',     fallback: '↑ ArrowUp'   },
        { label: '移動下', sk: 'down',   fallback: '↓ ArrowDown'  },
        { label: '移動左', sk: 'left',   fallback: '← ArrowLeft'  },
        { label: '移動右', sk: 'right',  fallback: '→ ArrowRight' },
        { label: '攻擊鍵', sk: 'attack', fallback: '滑鼠左鍵'   }
    ];
    const rebindBtns = {};

    const _cancelRebind = () => {
        if (_rebindBlink)   { clearInterval(_rebindBlink);  _rebindBlink   = null; }
        if (_rebindTimeout) { clearTimeout(_rebindTimeout); _rebindTimeout = null; }
        const tgt = gameState._rebindTarget;
        if (tgt && rebindBtns[tgt]) {
            const def = keyDefs.find(x => x.sk === tgt);
            rebindBtns[tgt].textContent = _keyDisplay(gameState.settings.keys[tgt]) + '  /  ' + (def ? def.fallback : '');
            rebindBtns[tgt].style.cssText = rebindBtns[tgt]._baseStyle;
        }
        gameState._rebindTarget = null;
    };

    const _finishRebind = (sk, newKey) => {
        if (_rebindBlink)   { clearInterval(_rebindBlink);  _rebindBlink   = null; }
        if (_rebindTimeout) { clearTimeout(_rebindTimeout); _rebindTimeout = null; }
        gameState.settings.keys[sk] = newKey;
        gameState._rebindTarget = null;
        if (rebindBtns[sk]) {
            const def = keyDefs.find(x => x.sk === sk);
            rebindBtns[sk].textContent = _keyDisplay(newKey) + '  /  ' + (def ? def.fallback : '');
            rebindBtns[sk].style.cssText = rebindBtns[sk]._baseStyle;
        }
        AudioManager.play('eatFruit');
        saveSettings();
    };

    const _startRebind = (sk) => {
        if (gameState._rebindTarget) _cancelRebind();
        gameState._rebindTarget = sk;
        const btn = rebindBtns[sk];
        if (!btn) return;
        btn.textContent = '請按下新按鍵...';
        btn.style.cssText = btn._baseStyle + 'border-color:#FFD700;color:#FFD700;';
        let blinkOn = true;
        _rebindBlink = setInterval(() => {
            if (!gameState._rebindTarget) { clearInterval(_rebindBlink); _rebindBlink = null; return; }
            blinkOn = !blinkOn;
            try { btn.style.color = blinkOn ? '#FFD700' : '#888'; } catch(e) {}
        }, 350);
        _rebindTimeout = setTimeout(() => {
            if (gameState._rebindTarget === sk) _cancelRebind();
            _rebindTimeout = null;
        }, 5000);
    };

    // Keydown handler（capture 優先，攔截所有按鍵）
    _settingsKeyHandler = (e) => {
        if (!gameState._rebindTarget) return;
        e.preventDefault(); e.stopPropagation();
        if (e.key === 'Escape') { _cancelRebind(); return; }
        _finishRebind(gameState._rebindTarget, e.key.toLowerCase());
    };
    document.addEventListener('keydown', _settingsKeyHandler, true);

    // Mousedown handler（capture，任意左鍵點擊可綁定滑鼠左鍵）
    _settingsMouseHandler = (e) => {
        if (!gameState._rebindTarget) return;
        if (e.button !== 0) return;
        if (rebindBtns[gameState._rebindTarget] && e.target === rebindBtns[gameState._rebindTarget]) return;
        e.stopPropagation();
        _finishRebind(gameState._rebindTarget, 'mouseleft');
    };
    document.addEventListener('mousedown', _settingsMouseHandler, true);

    keyDefs.forEach(({ label, sk, fallback }) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
        const lbl = document.createElement('div');
        lbl.style.cssText = 'min-width:68px;font-size:13px;'; lbl.textContent = label;
        row.appendChild(lbl);
        const btn = document.createElement('button');
        btn._baseStyle = 'flex:1;padding:6px 10px;cursor:pointer;background:#2a2a2a;color:white;border:1px solid #666;border-radius:4px;font-size:13px;text-align:left;';
        btn.style.cssText = btn._baseStyle;
        btn.textContent = _keyDisplay(gameState.settings.keys[sk]) + '  /  ' + fallback;
        btn.onclick = (e) => {
            e.stopPropagation();
            if (gameState._rebindTarget === sk) { _cancelRebind(); return; }
            _startRebind(sk);
        };
        rebindBtns[sk] = btn;
        row.appendChild(btn);
        keySec.appendChild(row);
    });
    panel.appendChild(keySec);

    // ─── 其他設定 ───
    const otherSec = _buildSettingsSection('其他設定');
    const restartBtn = document.createElement('button');
    restartBtn.style.cssText = 'width:100%;padding:8px;cursor:pointer;border:1px solid #884444;background:rgba(136,0,0,0.3);color:white;border-radius:4px;font-size:13px;margin-bottom:8px;';
    restartBtn.textContent = '重啟遊戲';
    restartBtn.onclick = () => { if (confirm('確定重啟？本局進度將消失，不給予技能點（除非已擊殺精英怪）')) window.location.reload(); };
    otherSec.appendChild(restartBtn);
    const resetBtn = document.createElement('button');
    resetBtn.style.cssText = 'width:100%;padding:8px;cursor:pointer;border:1px solid #555;background:rgba(80,80,80,0.3);color:white;border-radius:4px;font-size:13px;';
    resetBtn.textContent = '恢復原廠設定';
    resetBtn.onclick = () => {
        if (!confirm('確定要恢復所有音量和按鍵設定為預設值？')) return;
        gameState.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
        saveSettings(); AudioManager.refreshMusicVolume();
        hideSettings(); showSettings();
    };
    otherSec.appendChild(resetBtn);
    panel.appendChild(otherSec);

    // ─── 底部按鈕 ───
    const saveBtn = document.createElement('button');
    saveBtn.style.cssText = 'width:100%;margin-top:14px;padding:10px;cursor:pointer;border:1px solid #4a8a4a;background:#2a5a2a;color:white;border-radius:4px;font-size:15px;';
    saveBtn.textContent = '儲存並返回';
    saveBtn.onclick = () => { saveSettings(); hideSettings(); };
    panel.appendChild(saveBtn);

    overlay.appendChild(panel);
    document.getElementById('game-container').appendChild(overlay);
}

function hideSettings() {
    if (_settingsKeyHandler)   { document.removeEventListener('keydown',   _settingsKeyHandler,   true); _settingsKeyHandler   = null; }
    if (_settingsMouseHandler) { document.removeEventListener('mousedown', _settingsMouseHandler, true); _settingsMouseHandler = null; }
    if (_rebindBlink)   { clearInterval(_rebindBlink);  _rebindBlink   = null; }
    if (_rebindTimeout) { clearTimeout(_rebindTimeout); _rebindTimeout = null; }
    gameState._rebindTarget = null;
    const overlay = document.getElementById('settings-overlay');
    if (overlay) overlay.remove();
    gameState.settingsOpen = false;
    gameState.lastTimeTick = Date.now();
}

function applySkillBonuses() {
    const sk = gameState.playerSkills;
    const p = gameState.player;
    // 強壯體魄：起始 HP +20 per level
    const hpBonus = (sk.vitality || 0) * 20;
    gameState.stats.hpMax += hpBonus;
    gameState.stats.hpCurrent = gameState.stats.hpMax;
    // 敏捷身手：起始速度 +0.2 per level
    p.speed += (sk.agility || 0) * 0.2;
    // 幸運重選：全局重選次數 = 技能等級
    p.rerollsRemaining = sk.luckyReroll || 0;
    // 收集成癮：收集範圍 +10px per level
    p.pickupRange += (sk.collectionAddiction || 0) * 10;
    // 恐怖之牙：攻擊 +2 per level
    p.attack += (sk.terribleFang || 0) * 2;
    // 恐怖之牙 Lv5：開局獲得獠牙 Lv1
    if ((sk.terribleFang || 0) >= 5 && !p.organs.find(o => o.id === 'fang')) {
        const fangOrgan = { id: 'fang', name: '獠牙', type: 'attack', level: 1, desc: ORGANS.fang.levels[0].desc };
        p.organs.push(fangOrgan);
        applyOrganEffects(fangOrgan);
    }
    // 記憶器官：載入玩家死亡時手動選擇保留的器官（只用一次）
    const savedOrgans = localStorage.getItem('savedOrgans');
    if (savedOrgans) {
        try {
            const organs = JSON.parse(savedOrgans);
            organs.forEach(organ => {
                if (p.organs.find(o => o.id === organ.id)) return;
                const o = Object.assign({}, organ, { inherited: true, level: organ.level || 1 });
                p.organs.push(o);
                applyOrganEffects(o);
            });
        } catch(e) {}
        localStorage.removeItem('savedOrgans');
    }
    // 隱藏器官繼承：玩家主動選擇保留的隱藏器官（最多1個）
    const savedHiddenOrgans = localStorage.getItem('savedHiddenOrgans');
    if (savedHiddenOrgans) {
        try {
            const hOrgans = JSON.parse(savedHiddenOrgans);
            hOrgans.forEach(organ => {
                if (p.hiddenOrgans.find(h => h.id === organ.id)) return;
                p.hiddenOrgans.push(Object.assign({}, organ));
                applyHiddenOrganEffects(organ);
            });
        } catch(e) {}
        localStorage.removeItem('savedHiddenOrgans');
    }
}

function showSkillTree(cause) {
    if (gameState.gameOver) return;
    gameState.gameOver = true;
    gameState.skillTreeOpen = true;
    AudioManager.play('death');
    AudioManager.stopMusic();
    gameState.skillPoints += 1;
    localStorage.setItem('playerSkills', JSON.stringify(gameState.playerSkills));
    localStorage.setItem('skillPoints', String(gameState.skillPoints));
    localStorage.removeItem('savedOrgans');
    localStorage.removeItem('savedHiddenOrgans');
    buildSkillTreeOverlay(cause);
}

function upgradeSkill(id) {
    if (gameState.skillPoints <= 0) return;
    const skill = SKILLS[id];
    if (!skill) return;
    const current = gameState.playerSkills[id] || 0;
    if (current >= skill.maxLevel) return;
    gameState.playerSkills[id] = current + 1;
    gameState.skillPoints--;
    localStorage.setItem('playerSkills', JSON.stringify(gameState.playerSkills));
    localStorage.setItem('skillPoints', String(gameState.skillPoints));
    buildSkillTreeOverlay();
}

function addXP(amount) {
    gameState.stats.xpCurrent += amount;
    gameState.player.levelXP += amount;
    checkLevelUp();
}

function checkLevelUp() {
    const p = gameState.player;
    const threshold = 100 + (p.level - 1) * 50;
    if (p.levelXP >= threshold) {
        p.levelXP = 0;
        p.level++;
        gameState.levelUpMessage = { text: '⬆️ 升級！Lv.' + p.level, timer: Date.now() };
        AudioManager.play('levelUp');
        showOrganSelection();
    }
}

function updateTimer() {
    const now = Date.now();
    if (gameState.lastTimeTick === 0) { gameState.lastTimeTick = now; return; }
    const elapsed = (now - gameState.lastTimeTick) / 1000;
    gameState.lastTimeTick = now;
    gameState.timeRemaining = Math.max(0, gameState.timeRemaining - elapsed);
    const total = Math.ceil(gameState.timeRemaining);
    const m = Math.floor(total / 60).toString().padStart(2, '0');
    const s = (total % 60).toString().padStart(2, '0');
    gameState.stats.timeStatus = m + ':' + s;
    if (gameState.timeRemaining <= 80 && !gameState.bossSpawned && !gameState.bossBellPlayed) {
        gameState.bossBellPlayed = true;
        AudioManager.play('bossBell');
    }
    if (gameState.timeRemaining <= 0) showSkillTree('timeout');
}

function showGameOver() {
    gameState.gameOver = true;
    let overlay = document.getElementById('game-over-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'game-over-overlay';
        overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-size:32px;z-index:100;pointer-events:all;';
        overlay.innerHTML = '<div style="font-size:48px;margin-bottom:16px;">遊戲結束</div>' +
            '<div style="font-size:20px;margin-bottom:8px;">時間耗盡！</div>' +
            '<div style="font-size:18px;margin-bottom:24px;">最終 XP：' + gameState.stats.xpCurrent + '</div>' +
            '<button onclick="location.reload()" style="font-size:20px;padding:10px 28px;cursor:pointer;pointer-events:all;">重新開始</button>' +
            '<div style="font-size:12px;color:#555;margin-top:20px;">© ' + GAME_INFO.author + ' | ' + GAME_INFO.version + '</div>';
        document.getElementById('game-container').appendChild(overlay);
    }
}

// =============================================================
// 日夜循環系統
// =============================================================

function getDayNightPhaseIndex() {
    // 每 75 秒一個時段，共 8 段；偶數=白天，奇數=夜晚
    return Math.min(7, Math.floor(Math.max(0, 600 - gameState.timeRemaining) / 75));
}

function applyNightTransition() {
    gameState.stats.dayCycle = '夜晚';
    gameState.isNight = true;
    gameState.dayNightMessage.text = '🌙 夜晚來臨';
    gameState.dayNightMessage.timer = Date.now();
    for (const c of gameState.hostileCreatures) {
        if (c.hp > 0) { c.speed += 0.2; c.damage += 2; }
    }
    const nightNum = (gameState.currentPhaseIndex + 1) / 2;
    if (nightNum >= 1 && nightNum <= 3 && !gameState.eliteCreature) {
        spawnEliteCreature(nightNum);
        AudioManager.playMusic('bossTheme');
    } else {
        AudioManager.playMusic('morningTheme');
    }
}

function applyDayTransition() {
    gameState.stats.dayCycle = '白天';
    gameState.isNight = false;
    if (gameState.eliteCreature && gameState.eliteCreature.hp > 0) {
        gameState.eliteCreature = null;
        gameState.dayNightMessage.text = '☀️ 黎明到來，精英怪撤退了';
    } else {
        gameState.dayNightMessage.text = '☀️ 黎明到來';
    }
    gameState.dayNightMessage.timer = Date.now();
    for (const c of gameState.hostileCreatures) {
        if (c.hp > 0) { c.speed = Math.max(0.1, c.speed - 0.2); c.damage = Math.max(1, c.damage - 2); }
    }
    AudioManager.playMusic('morningTheme');
}

function updateDayNightCycle() {
    const phaseIndex = getDayNightPhaseIndex();
    if (phaseIndex === gameState.currentPhaseIndex) return;
    gameState.currentPhaseIndex = phaseIndex;
    if (phaseIndex % 2 === 1) {
        applyNightTransition();
    } else {
        applyDayTransition();
    }
    if (phaseIndex === 7 && !gameState.bossSpawned) spawnBoss();
}

function spawnCreatureAtEdge(type) {
    const GRID = 5, BLOCK = 1600; // 5x5 格，每格 1600px，座標範圍 0–8000
    const bonus = gameState.creatureStrengthMultiplier;

    // 統計各格存活數量
    const alive = (type === 'neutral'
        ? gameState.neutralCreatures
        : gameState.hostileCreatures).filter(c => c.hp > 0);
    const counts = new Array(25).fill(0);
    for (const c of alive) {
        const gi = Math.min(4, Math.floor(c.x / BLOCK)) + Math.min(4, Math.floor(c.y / BLOCK)) * GRID;
        counts[gi]++;
    }
    // 加權隨機：存活越少的格子越容易被選到
    const weights = counts.map(n => 1 / (n + 1));
    const total = weights.reduce((s, w) => s + w, 0);
    let r = Math.random() * total, block = 0;
    for (let i = 0; i < 25; i++) { r -= weights[i]; if (r <= 0) { block = i; break; } }
    const gx = block % GRID;
    const gy = Math.floor(block / GRID);
    const x = gx * BLOCK + 50 + Math.random() * (BLOCK - 100);
    const y = gy * BLOCK + 50 + Math.random() * (BLOCK - 100);

    if (type === 'neutral') {
        gameState.neutralCreatures.push({
            x, y, radius: 12, hp: 30 + bonus * 10, maxHp: 30 + bonus * 10,
            speed: 0.8 + bonus * 0.1, damage: 3 + bonus,
            diet: Math.random() < 0.5 ? 'herbivore' : 'omnivore',
            state: 'wandering', fleeRange: 100, fightBackRange: 40,
            canFight: Math.random() < 0.5, attackCooldown: 0,
            wanderTarget: null, lastWanderTime: Date.now()
        });
    } else {
        const roll = Math.random();
        const diet = roll < 0.8 ? 'carnivore' : (roll < 0.9 ? 'herbivore' : 'omnivore');
        const nightSpd = gameState.isNight ? 0.2 : 0;
        const nightDmg = gameState.isNight ? 2 : 0;
        gameState.hostileCreatures.push({
            x, y, radius: 10, hp: 50 + bonus * 10, maxHp: 50 + bonus * 10,
            speed: Math.min(2.5, 1.2 + bonus * 0.1 + nightSpd),
            damage: Math.min(20, 5 + bonus + nightDmg),
            attackCooldown: 0, diet, state: 'patrolling',
            aggroRange: 150, attackRange: 20,
            wanderTarget: null, lastWanderTime: Date.now(),
            target: null, targetType: null
        });
    }
}

function updateCreatureSpawning() {
    const now = Date.now();
    const elapsed = (600 - gameState.timeRemaining);
    gameState.creatureStrengthMultiplier = Math.floor(elapsed / 150);

    const aliveNeutral = gameState.neutralCreatures.filter(c => c.hp > 0).length;
    const neutralSpawnInterval = aliveNeutral === 0 ? 9000 : 30000;
    if (aliveNeutral < 50 && now - gameState.spawnTimers.neutral >= neutralSpawnInterval) {
        spawnCreatureAtEdge('neutral');
        gameState.spawnTimers.neutral = now;
    }

    const maxHostile = 35;
    const aliveHostile = gameState.hostileCreatures.filter(c => c.hp > 0).length;
    const hostileSpawnInterval = (aliveHostile === 0 || gameState.fruits.length === 0) ? 13500 : 45000;
    if (aliveHostile < maxHostile && now - gameState.spawnTimers.hostile >= hostileSpawnInterval) {
        spawnCreatureAtEdge('hostile');
        gameState.spawnTimers.hostile = now;
    }
}

function spawnBoss() {
    const playerBiome = getBiome(gameState.player.x, gameState.player.y);
    const cfg = BOSS_CONFIG[playerBiome] || BOSS_CONFIG.forest;
    let bx, by;
    if (cfg.spawnX !== null) {
        bx = cfg.spawnX;
        by = cfg.spawnY;
    } else {
        // 森林 Boss：地圖邊緣隨機生成
        const r = cfg.radius;
        const edge = Math.floor(Math.random() * 4);
        if (edge === 0)      { bx = Math.random() * MAP_WIDTH;  by = r; }
        else if (edge === 1) { bx = Math.random() * MAP_WIDTH;  by = MAP_HEIGHT - r; }
        else if (edge === 2) { bx = r;             by = Math.random() * MAP_HEIGHT; }
        else                 { bx = MAP_WIDTH - r; by = Math.random() * MAP_HEIGHT; }
    }
    gameState.boss = {
        x: bx, y: by,
        radius: cfg.radius, hp: cfg.hp, maxHp: cfg.hp,
        speed: cfg.speed, damage: cfg.damage,
        aggroRange: cfg.aggroRange, attackRange: cfg.attackRange,
        attackCooldown: 0, state: 'patrolling',
        wanderTarget: null, lastWanderTime: Date.now(),
        name: cfg.name, label: cfg.label,
        color: cfg.color, colorChasing: cfg.colorChasing,
        glowColor: cfg.glowColor
    };
    gameState.bossSpawned = true;
    gameState.dayNightMessage.text = '⚠️ 強大的' + cfg.name + '出現了！';
    gameState.dayNightMessage.timer = Date.now();
    AudioManager.playMusic('bossTheme');
}

function updateBoss() {
    const boss = gameState.boss;
    if (!boss || boss.hp <= 0) return;
    const now = Date.now();
    const p = gameState.player;
    if (boss.stunnedUntil && now < boss.stunnedUntil) return;
    const { dx, dy } = wrappedDelta(boss.x, boss.y, p.x, p.y);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < boss.aggroRange) {
        boss.state = 'chasing';
    } else if (boss.state === 'chasing' && dist > boss.aggroRange + 150) {
        boss.state = 'patrolling';
    }
    if (boss.state === 'chasing') {
        if (dist <= boss.attackRange) {
            if (now - boss.attackCooldown >= 1500) {
                applyDamageToPlayer(boss.damage, boss);
                boss.attackCooldown = now;
            }
        } else {
            const angle = Math.atan2(dy, dx);
            moveCreature(boss, boss.x + Math.cos(angle) * boss.speed, boss.y + Math.sin(angle) * boss.speed);
        }
    } else {
        if (!boss.wanderTarget || now - boss.lastWanderTime >= 3000) {
            boss.wanderTarget = { x: Math.random() * MAP_WIDTH, y: Math.random() * MAP_HEIGHT };
            boss.lastWanderTime = now;
        }
        if (boss.wanderTarget) {
            const { dx: wx, dy: wy } = wrappedDelta(boss.x, boss.y, boss.wanderTarget.x, boss.wanderTarget.y);
            const wDist = Math.sqrt(wx * wx + wy * wy);
            if (wDist < 2) { boss.wanderTarget = null; }
            else {
                const angle = Math.atan2(wy, wx);
                moveCreature(boss, boss.x + Math.cos(angle) * boss.speed, boss.y + Math.sin(angle) * boss.speed);
            }
        }
    }
}

function spawnEliteCreature(nightNum) {
    const tierIndex = nightNum - 1;
    const tier = ELITE_CONFIG.nights[tierIndex];
    const hp = Math.round(ELITE_CONFIG.base.hp * tier.hpMult);

    const edge = Math.floor(Math.random() * 4);

    if (edge === 0) { x = Math.random() * MAP_WIDTH;  y = r; }
    else if (edge === 1) { x = Math.random() * MAP_WIDTH;  y = MAP_HEIGHT - r; }
    else if (edge === 2) { x = r;             y = Math.random() * MAP_HEIGHT; }
    else                 { x = MAP_WIDTH - r; y = Math.random() * MAP_HEIGHT; }
    gameState.eliteCreature = {
        x, y, radius: 18, hp, maxHp: hp,
        speed: tier.speed, damage: tier.damage,

function updateEliteCreature() {
    const elite = gameState.eliteCreature;
    if (!elite || elite.hp <= 0) return;
    const now = Date.now();
    const p = gameState.player;
    if (elite.stunnedUntil && now < elite.stunnedUntil) return;
    const { dx, dy } = wrappedDelta(elite.x, elite.y, p.x, p.y);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < elite.aggroRange) {
        elite.state = 'chasing';
    } else if (elite.state === 'chasing' && dist > elite.aggroRange + 100) {
        elite.state = 'patrolling';
    }
    if (elite.state === 'chasing') {
        if (dist <= elite.attackRange) {
            if (now - elite.attackCooldown >= 1200) {
                applyDamageToPlayer(elite.damage, elite);
                elite.attackCooldown = now;
            }
        } else {
            const angle = Math.atan2(dy, dx);
            moveCreature(elite, elite.x + Math.cos(angle) * elite.speed, elite.y + Math.sin(angle) * elite.speed);
        }
    } else {
        if (!elite.wanderTarget || now - elite.lastWanderTime >= 2500) {
            elite.wanderTarget = { x: Math.random() * MAP_WIDTH, y: Math.random() * MAP_HEIGHT };
            elite.lastWanderTime = now;
        }
        if (elite.wanderTarget) {
            const { dx: wx, dy: wy } = wrappedDelta(elite.x, elite.y, elite.wanderTarget.x, elite.wanderTarget.y);
            const wDist = Math.sqrt(wx * wx + wy * wy);
            if (wDist < 2) { elite.wanderTarget = null; }
            else {
                const angle = Math.atan2(wy, wx);
                moveCreature(elite, elite.x + Math.cos(angle) * elite.speed, elite.y + Math.sin(angle) * elite.speed);
            }

}

function drawEliteCreature() {
    const elite = gameState.eliteCreature;
    if (!elite || elite.hp <= 0) return;
    const s = worldToScreen(elite.x, elite.y);
    if (s.x < -50 || s.x > VIEW_W + 50 || s.y < -50 || s.y > VIEW_H + 50) return;
    ctx.save();
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 14;
    ctx.fillStyle = elite.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, elite.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(elite.label, s.x, s.y - elite.radius - 12);
    ctx.restore();
    const bW = 46, bH = 5;
    const bX = s.x - bW / 2;
    const bY = s.y - elite.radius - 24;
    ctx.fillStyle = '#330033';
    ctx.fillRect(bX, bY, bW, bH);
    ctx.fillStyle = '#CC44FF';
    ctx.fillRect(bX, bY, bW * (elite.hp / elite.maxHp), bH);
}

function drawEliteArrow() {
    const elite = gameState.eliteCreature;
    if (!elite || elite.hp <= 0) return;
    const es = worldToScreen(elite.x, elite.y);
    if (es.x >= -20 && es.x <= VIEW_W + 20 && es.y >= -20 && es.y <= VIEW_H + 20) return;
    const p = gameState.player;
    const ps = worldToScreen(p.x, p.y);
    const { dx: adx, dy: ady } = wrappedDelta(p.x, p.y, elite.x, elite.y);
    const angle = Math.atan2(ady, adx);
    const arrowDist = 50 + Math.max(0, p.radius - 10);
    const ax = ps.x + Math.cos(angle) * arrowDist;
    const ay = ps.y + Math.sin(angle) * arrowDist;
    const alpha = Math.floor(Date.now() / 500) % 2 === 0 ? 0.6 : 1.0;
    const color = elite.diet === 'herbivore' ? '#FFD700' : '#9B59B6';
    const cx = Math.cos(angle), cy = Math.sin(angle);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - cx * 10 - cy * 3, ay - cy * 10 + cx * 3);
    ctx.lineTo(ax - cx * 10 + cy * 3, ay - cy * 10 - cx * 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function handleEliteKill(elite) {
    const xp = elite.xp;
    gameState.eliteCreature = null;
    gameState.eliteJustKilled = true;
    addXP(xp);
    showXPPopup(gameState.player.x, gameState.player.y, xp);
    gameState.skillPoints += 1;
    localStorage.setItem('skillPoints', String(gameState.skillPoints));
    // 跳到下一個白天：phase 1→525s, phase 3→375s, phase 5→225s
    const nextDayTime = 600 - (gameState.currentPhaseIndex + 1) * 75;
    gameState.timeRemaining = nextDayTime;
    updateDayNightCycle();
    gameState.dayNightMessage.text = '☀️ 精英已滅！黎明提前到來！';
    gameState.dayNightMessage.timer = Date.now();
    // 隱藏器官掉落：每個有50%機率，已擁有的不重複掉落
    if (!gameState.gameOver) {
        const ownedIds = (gameState.player.hiddenOrgans || []).map(h => h.id);
        const drops = Object.values(HIDDEN_ORGANS).filter(h => !ownedIds.includes(h.id) && Math.random() < 0.5);
        if (drops.length > 0) showHiddenOrganSelection(drops);
    }
}

function showHiddenOrganSelection(drops) {

    const sub = document.createElement('div');
    sub.style.cssText = 'color:#aaa;font-size:13px;margin-bottom:18px;';
    sub.textContent = drops.length > 1 ? '選擇1個獲得（隱藏器官不佔普通槽位）' : '點擊獲得（隱藏器官不佔普通槽位）';
    overlay.appendChild(sub);

    drops.forEach(organ => {

        btn.innerHTML = '<div style="color:#FFD700;font-weight:bold;font-size:16px;margin-bottom:5px;">✨ ' + organ.name + '</div>' +
            '<div style="font-size:12px;color:#ddd;">' + organ.desc + '</div>';

        btn.onmouseleave = () => { btn.style.background = 'rgba(255,215,0,0.08)'; };
        btn.onclick = () => {
            const p = gameState.player;
            if (!p.hiddenOrgans) p.hiddenOrgans = [];
            p.hiddenOrgans.push(Object.assign({}, organ));
            applyHiddenOrganEffects(organ);
            closeOverlay();
        };
        overlay.appendChild(btn);
    });

    document.getElementById('game-container').appendChild(overlay);
}

function isGamePaused() {
    return gameState.organSelectionActive || gameState.settingsOpen || gameState.skillTreeOpen || gameState.gameOver || gameState.victory;
}

/**
 * 遊戲循環主函數。使用 requestAnimationFrame 確保平滑的動畫效果。
 */
function gameLoop() {
    const loopNow = Date.now();
    const dt = gameState.lastLoopTime > 0 ? loopNow - gameState.lastLoopTime : 16;
    gameState.lastLoopTime = loopNow;
    if (!isGamePaused()) {
        updateTimer();
        updateDayNightCycle();
        updateCreatureSpawning();
        updatePlayerMovement();
        updateCamera();
        checkFruitCollision();
        updateTreeFruitProduction(dt);
        updateNeutralCreatures();
        updateHostileCreatures();
        if (gameState.boss && gameState.boss.hp > 0) updateBoss();
        if (gameState.eliteCreature && gameState.eliteCreature.hp > 0) updateEliteCreature();
        updatePassiveOrgans();
        updateStatusEffects();
        checkTreasureCollision();
        updateCorpseEating();
    }
    drawGame();
    updateUI();
    requestAnimationFrame(gameLoop);
}


/**
 * 初始化遊戲。需要調用一次才能啟動循環。
 */
function initializeGame() {
    console.log("--- 遊戲初始化開始 ---");

// 1. 生成環境
    generateTrees(150); // 8000x8000 地圖

    // 2. 初始化果子：從各棵樹分散生成共 80 顆
    gameState.fruits = [];
    const shuffledTrees = gameState.trees.slice().sort(() => Math.random() - 0.5);
    for (const tree of shuffledTrees) {
        if (gameState.fruits.length >= 80) break;
        spawnFruitFromTree(tree);
    }

    // 3. 生成中立生物
    spawnNeutralCreatures();

    // 4. 生成敵意生物與初始化屍體、寶物陣列
    gameState.corpses = [];
    gameState.treasures = [];
    spawnHostileCreatures();

    // 5. 設定事件監聽器
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);
    canvas.addEventListener('click', function() {
        if (!gameState.organSelectionActive && !gameState.settingsOpen) playerAttack();
    });

    // 4. 存檔版本檢查：版本不一致時清除所有存檔
    const SAVE_KEYS = ['playerSkills', 'skillPoints', 'savedOrgans', 'savedHiddenOrgans'];
    const storedSaveVer = localStorage.getItem('saveVersion');
    if (storedSaveVer !== GAME_INFO.SAVE_VERSION) {
        SAVE_KEYS.forEach(k => localStorage.removeItem(k));
        localStorage.setItem('saveVersion', GAME_INFO.SAVE_VERSION);
        console.log('--- 存檔版本不一致，已清除所有存檔（' + storedSaveVer + ' → ' + GAME_INFO.SAVE_VERSION + '）---');
    }

    // 6. 載入設定（音量、按鍵）
    loadSettings();

    // 7. 載入技能與進化資料並套用起始加成
    try {
        const savedSkills = localStorage.getItem('playerSkills');
        if (savedSkills) gameState.playerSkills = JSON.parse(savedSkills);
        const savedPoints = localStorage.getItem('skillPoints');
        if (savedPoints) gameState.skillPoints = Math.max(0, parseInt(savedPoints, 10) || 0);
        // 進化不從 localStorage 讀取，每局從草食性 Lv.1 重新開始
    } catch(e) {}
    applySkillBonuses();
    applyEvolutionEffects();

    // 8. 初始化計時狀態
    gameState.lastTimeTick = Date.now();
    gameState.spawnTimers.neutral = Date.now();
    gameState.spawnTimers.hostile = Date.now();

    // 9. 初始化音效系統並播放背景音樂
    initAudio();

    updateUI();

    console.log("--- 初始化完成，啟動遊戲循環 ---");

    // 10. 開始遊戲主循環
    requestAnimationFrame(gameLoop);
}

    overlay.appendChild(footerEl);

    let started = false;
    const start = () => {
        if (started) return;
        started = true;
        overlay.remove();
        document.removeEventListener('keydown', startOnKey);
        initializeGame();
    };
    const startOnKey = () => start();
    btn.onclick = start;
    document.addEventListener('keydown', startOnKey);

    document.getElementById('game-container').appendChild(overlay);
}

// =============================================================
// 程序入口點 (Entry Point)
// =============================================================
window.onload = showStartScreen;

</script>
</body>
</html>
