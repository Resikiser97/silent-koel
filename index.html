function spawnEliteCreature(nightNum) {
    const tierIndex = nightNum - 1;
    const tier = ELITE_CONFIG.nights[tierIndex];
    const hp = Math.round(ELITE_CONFIG.base.hp * tier.hpMult);
    const w = gameState.canvasWidth, h = gameState.canvasHeight, r = 18;
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = Math.random() * w; y = r; }
    else if (edge === 1) { x = Math.random() * w; y = h - r; }
    else if (edge === 2) { x = r; y = Math.random() * h; }
    else { x = w - r; y = Math.random() * h; }
    gameState.eliteCreature = {
        x, y, radius: 18, hp, maxHp: hp,
        speed: tier.speed, damage: tier.damage,
        aggroRange: 250, attackRange: 28,
        attackCooldown: 0, state: 'patrolling',
        wanderTarget: null, lastWanderTime: Date.now(),
        label: tier.label, color: tier.color, xp: tier.xp
    };
    gameState.eliteJustKilled = false;
    gameState.dayNightMessage.text = '🌟 精英怪出現了！';
    gameState.dayNightMessage.timer = Date.now();
}

function updateEliteCreature() {
    const elite = gameState.eliteCreature;
    if (!elite || elite.hp <= 0) return;
    const now = Date.now();
    const p = gameState.player;
    if (elite.stunnedUntil && now < elite.stunnedUntil) return;
    const dx = p.x - elite.x;
    const dy = p.y - elite.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < elite.aggroRange) {
        elite.state = 'chasing';
    } else if (elite.state === 'chasing' && dist > elite.aggroRange + 100) {
        elite.state = 'patrolling';
    }
    if (elite.state === 'chasing') {
        if (dist <= elite.attackRange) {
            if (now - elite.attackCooldown >= 1200) {
                applyDamageToPlayer(elite.damage, elite);
                elite.attackCooldown = now;
            }
        } else {
            const angle = Math.atan2(dy, dx);
            moveCreature(elite, elite.x + Math.cos(angle) * elite.speed, elite.y + Math.sin(angle) * elite.speed);
        }
    } else {
        if (!elite.wanderTarget || now - elite.lastWanderTime >= 2500) {
            elite.wanderTarget = {
                x: Math.random() * (gameState.canvasWidth - 60) + 30,
                y: Math.random() * (gameState.canvasHeight - 60) + 30
            };
            elite.lastWanderTime = now;
        }
        if (elite.wanderTarget) {
            const wx = elite.wanderTarget.x - elite.x;
            const wy = elite.wanderTarget.y - elite.y;
            const wDist = Math.sqrt(wx * wx + wy * wy);
            if (wDist < 2) { elite.wanderTarget = null; }
            else {
                const angle = Math.atan2(wy, wx);
                moveCreature(elite, elite.x + Math.cos(angle) * elite.speed, elite.y + Math.sin(angle) * elite.speed);
            }
        }
    }
}

function drawEliteCreature() {
    const elite = gameState.eliteCreature;
    if (!elite || elite.hp <= 0) return;
    ctx.save();
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 14;
    ctx.fillStyle = elite.color;
    ctx.beginPath();
    ctx.arc(elite.x, elite.y, elite.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(elite.label, elite.x, elite.y - elite.radius - 12);
    ctx.restore();
    const bW = 46, bH = 5;
    const bX = elite.x - bW / 2;
    const bY = elite.y - elite.radius - 24;
    ctx.fillStyle = '#330033';
    ctx.fillRect(bX, bY, bW, bH);
    ctx.fillStyle = '#CC44FF';
    ctx.fillRect(bX, bY, bW * (elite.hp / elite.maxHp), bH);
}

function handleEliteKill(elite) {
    const xp = elite.xp;
    gameState.eliteCreature = null;
    gameState.eliteJustKilled = true;
    addXP(xp);
    showXPPopup(gameState.player.x, gameState.player.y, xp);
    gameState.skillPoints += 1;
    localStorage.setItem('skillPoints', String(gameState.skillPoints));
    // 跳到下一個白天：phase 1→900s, phase 3→600s, phase 5→300s
    const nextDayTime = 1200 - (gameState.currentPhaseIndex + 1) * 150;
    gameState.timeRemaining = nextDayTime;
    updateDayNightCycle();
    gameState.dayNightMessage.text = '☀️ 精英已滅！黎明提前到來！';
    gameState.dayNightMessage.timer = Date.now();
}

/**
 * 遊戲循環主函數。使用 requestAnimationFrame 確保平滑的動畫效果。
 */
function gameLoop() {
    if (!gameState.gameOver && !gameState.organSelectionActive) {
        updateTimer();
        updateDayNightCycle();
        updateCreatureSpawning();
        updatePlayerMovement();
        checkFruitCollision();
        manageFruitSpawning();
        updateNeutralCreatures();
        updateHostileCreatures();
        if (gameState.boss && gameState.boss.hp > 0) updateBoss();
        if (gameState.eliteCreature && gameState.eliteCreature.hp > 0) updateEliteCreature();
        updatePassiveOrgans();
        updateStatusEffects();
        checkTreasureCollision();
        updateCorpseEating();
    }
    drawGame();
    updateUI();
    requestAnimationFrame(gameLoop);
}


/**
 * 初始化遊戲。需要調用一次才能啟動循環。
 */
function initializeGame() {
    console.log("--- 遊戲初始化開始 ---");

// 1. 生成環境
    generateTrees(20); // 創建 20 棵樹木
    
    // 2. 初始化果子：生成最初的 15 顆果子
    gameState.fruits = []; 
    for (let i = 0; i < 15; i++) {
        spawnFruit(true); // 生成初始果子
    }

    // 3. 生成中立生物
    spawnNeutralCreatures();

    // 4. 生成敵意生物與初始化屍體、寶物陣列
    gameState.corpses = [];
    gameState.treasures = [];
    spawnHostileCreatures();

    // 5. 設定事件監聽器
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);
    canvas.addEventListener('click', function() {
        if (!gameState.organSelectionActive) playerAttack();
    });

    // 4. 載入技能與進化資料並套用起始加成
    try {
        const savedSkills = localStorage.getItem('playerSkills');
        if (savedSkills) gameState.playerSkills = JSON.parse(savedSkills);
        const savedPoints = localStorage.getItem('skillPoints');
        if (savedPoints) gameState.skillPoints = Math.max(0, parseInt(savedPoints, 10) || 0);
        // 進化不從 localStorage 讀取，每局從草食性 Lv.1 重新開始
    } catch(e) {}
    applySkillBonuses();
    applyEvolutionEffects();

    // 5. 初始化計時狀態，避免遊戲啟動瞬間生成過多或沒有果子。
    gameState.lastFruitSpawnTime = Date.now() - (8000 * 2);
    gameState.lastTimeTick = Date.now();
    gameState.spawnTimers.neutral = Date.now();
    gameState.spawnTimers.hostile = Date.now();

    updateUI();

    console.log("--- 初始化完成，啟動遊戲循環 ---");
    
    // 5. 開始遊戲主循環
    requestAnimationFrame(gameLoop);
}


// =============================================================
// 開發者模式 (Developer Mode)
// =============================================================

function toggleDevMode() {
    gameState.devMode = !gameState.devMode;
    document.getElementById('dev-panel').style.display    = gameState.devMode ? 'block' : 'none';
    document.getElementById('dev-indicator').style.display = gameState.devMode ? 'block' : 'none';
}

function devAddXP() {
    addXP(50);
}

function devAddHP() {
    gameState.stats.hpCurrent = Math.min(gameState.stats.hpMax, gameState.stats.hpCurrent + 20);
}

function devFullHP() {
    gameState.stats.hpCurrent = gameState.stats.hpMax;
}

function devSpawnFruits() {
    for (let i = 0; i < 5; i++) spawnFruit();
}

function devKillHostiles() {
    const now = Date.now();
    for (const c of gameState.hostileCreatures) {
        if (c.hp > 0) {
            c.hp = 0;
            gameState.corpses.push({ x: c.x, y: c.y, radius: c.radius, spawnTime: now });
        }
    }
}

function devSpawnNeutral() {
    const p = gameState.player;
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 40;
    const bonus = gameState.creatureStrengthMultiplier;
    gameState.neutralCreatures.push({
        x: Math.max(14, Math.min(gameState.canvasWidth - 14, p.x + Math.cos(angle) * dist)),
        y: Math.max(14, Math.min(gameState.canvasHeight - 14, p.y + Math.sin(angle) * dist)),
        radius: 12, hp: 30 + bonus * 10, maxHp: 30 + bonus * 10,
        speed: 0.8 + bonus * 0.1, damage: 3 + bonus,
        diet: Math.random() < 0.5 ? 'herbivore' : 'omnivore',
        state: 'wandering', fleeRange: 100, fightBackRange: 40,
        canFight: Math.random() < 0.5, attackCooldown: 0,
        wanderTarget: null, lastWanderTime: Date.now()
    });
}

function devSpawnHostile() {
    const p = gameState.player;
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 50;
    const bonus = gameState.creatureStrengthMultiplier;
    const roll = Math.random();
    const diet = roll < 0.8 ? 'carnivore' : (roll < 0.9 ? 'herbivore' : 'omnivore');
    gameState.hostileCreatures.push({
        x: Math.max(10, Math.min(gameState.canvasWidth - 10, p.x + Math.cos(angle) * dist)),
        y: Math.max(10, Math.min(gameState.canvasHeight - 10, p.y + Math.sin(angle) * dist)),
        radius: 10, hp: 50 + bonus * 10, maxHp: 50 + bonus * 10,
        speed: Math.min(2.5, 1.2 + bonus * 0.1), damage: Math.min(20, 5 + bonus),
        attackCooldown: 0, diet, state: 'patrolling',
        aggroRange: 150, attackRange: 20,
        wanderTarget: null, lastWanderTime: Date.now(),
        target: null, targetType: null
    });
}

function devFastForward() {
    gameState.timeRemaining = Math.max(0, gameState.timeRemaining - 300);
    gameState.lastTimeTick = Date.now();
}

function devRewind() {
    gameState.timeRemaining = Math.min(1200, gameState.timeRemaining + 300);
    gameState.lastTimeTick = Date.now();
}

function devToggleDayNight() {
    // 將 timeRemaining 跳到下一個時段起點，讓 updateDayNightCycle 自動觸發切換
    const nextIdx = (getDayNightPhaseIndex() + 1) % 8;
    gameState.timeRemaining = Math.max(0, 1200 - nextIdx * 150 - 1);
    gameState.lastTimeTick = Date.now();
}

// =============================================================
// 開始畫面
// =============================================================
function showStartScreen() {
    const overlay = document.createElement('div');
    overlay.id = 'start-screen';
    overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:#0d1a0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;pointer-events:all;color:white;font-family:Arial,sans-serif;';

    const titleEl = document.createElement('div');
    titleEl.style.cssText = 'font-size:40px;font-weight:bold;margin-bottom:10px;letter-spacing:2px;';
    titleEl.textContent = GAME_INFO.title;
    overlay.appendChild(titleEl);

    const subtitleEl = document.createElement('div');
    subtitleEl.style.cssText = 'font-size:16px;color:#aaa;letter-spacing:5px;margin-bottom:50px;';
    subtitleEl.textContent = GAME_INFO.subtitle;
    overlay.appendChild(subtitleEl);

    const btn = document.createElement('button');
    btn.style.cssText = 'font-size:20px;padding:12px 42px;cursor:pointer;pointer-events:all;border-radius:4px;background:#2a5a2a;color:white;border:1px solid #4a8a4a;margin-bottom:48px;';
    btn.textContent = '開始遊戲';
    overlay.appendChild(btn);

    const footerEl = document.createElement('div');
    footerEl.style.cssText = 'position:absolute;bottom:16px;font-size:12px;color:#555;';
    footerEl.textContent = '© 2026 ' + GAME_INFO.author + '  |  ' + GAME_INFO.version;
    overlay.appendChild(footerEl);

    let started = false;
    const start = () => {
        if (started) return;
        started = true;
        overlay.remove();
        document.removeEventListener('keydown', startOnKey);
        initializeGame();
    };
    const startOnKey = () => start();
    btn.onclick = start;
    document.addEventListener('keydown', startOnKey);

    document.getElementById('game-container').appendChild(overlay);
}

// =============================================================
// 程序入口點 (Entry Point)
// =============================================================
window.onload = showStartScreen;

</script>
</body>
</html>
