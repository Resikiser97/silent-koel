<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>噪鵑的森林冒險</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222; /* Overall background color */
            font-family: Arial, sans-serif;
        }
        #game-container {
            position: relative;
            width: 1600px;
            height: 900px;
            border: 1px solid #333;
        }
        canvas {
            display: block;
            background-color: #549954; /* Forest Green Background */
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicks/interactions to pass through */
            user-select: none;
        }

        /* Style for UI elements */
        .ui-panel {
            position: absolute;
            padding: 10px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 18px;
        }

        #top-left {
            top: 10px;
            left: 10px;
        }

        #minimap-container {
            position: absolute;
            top: 10px;
            right: 10px;
            pointer-events: none;
            user-select: none;
        }
        #minimapCanvas {
            display: block;
            border: 3px solid #8B6914;
            border-radius: 4px;
        }
        #minimap-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            padding: 6px 8px;
            margin-top: 2px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }
        
        /* XP Popup Animation */
        #xp-popup {
            position: absolute;
            color: #00FF00; /* Green color for XP popup */
            font-size: 24px;
            font-weight: bold;
            animation: fadeOutUp 1s forwards; 
            pointer-events: none;
        }

        @keyframes fadeOutUp {
            0% { opacity: 1; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-20px); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .status-line {
             margin-bottom: 5px;
        }

        #dev-panel {
            display: none;
            position: absolute;
            right: -155px;
            top: 80px;
            width: 140px;
            background: rgba(0, 0, 0, 0.78);
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px;
            z-index: 200;
            pointer-events: all;
        }
        #dev-panel-title {
            color: red;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #555;
        }
        #dev-panel button {
            display: block;
            width: 100%;
            margin: 4px 0;
            padding: 5px 8px;
            background: transparent;
            border: 1px solid red;
            color: white;
            cursor: pointer;
            border-radius: 3px;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }
        #dev-panel button:hover {
            background: rgba(255, 0, 0, 0.2);
        }
        #game-tooltip {
            display: none;
            position: fixed;
            background: rgba(0,0,0,0.85);
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 12px;
            max-width: 250px;
            font-size: 13px;
            line-height: 1.5;
            pointer-events: none;
            z-index: 9999;
            word-wrap: break-word;
        }
        #game-tooltip .tt-name { font-size:15px; font-weight:bold; margin-bottom:4px; }
        #game-tooltip .tt-hidden { font-size:11px; color:#FFD700; margin-bottom:3px; }
        #game-tooltip .tt-desc { font-size:12px; color:#ccc; }
        #game-tooltip .tt-combo { font-size:11px; color:#FFD700; margin-top:5px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HTML5 Canvas for drawing the game world -->
    <canvas id="gameCanvas" width="1600" height="900"></canvas>

    <!-- UI Overlay for displaying scores, time, etc. -->
    <div id="ui-overlay">
        <!-- Top Left: HP and XP -->
        <div class="ui-panel" id="top-left">
            <div class="status-line">HP: 50/50</div>
            <div class="status-line">XP: 0</div>
        </div>

        <!-- 右上角小地圖 -->
        <div id="minimap-container">
            <canvas id="minimapCanvas" width="300" height="300"></canvas>
            <div id="minimap-info">
                <span id="minimap-biome">🌲 森林</span>
                <span style="display:flex;align-items:center;gap:4px;">
                    <canvas id="sunmoonCanvas" width="24" height="24"></canvas>
                    <span id="minimap-time">00:00</span>
                </span>
            </div>
            <div id="dev-indicator" style="display:none; color:red; font-size:14px; font-weight:bold; margin-top:4px; text-align:center;">🛠️ 開發者模式</div>
        </div>
    </div>

    <!-- Developer Panel -->
    <div id="dev-panel">
        <div id="dev-panel-title">🛠️ DEV MODE</div>
        <div id="dev-stats" style="font-size:12px;color:#ccc;margin-bottom:8px;padding:4px 0 6px;border-bottom:1px solid #444;line-height:1.8;">
            <div id="dev-stat-fruits">🍎 果子總數：--</div>
            <div id="dev-stat-neutral">🟠 中立生物：-- / 50</div>
            <div id="dev-stat-hostile">🔴 敵意生物：-- / 35</div>
        </div>
        <button onclick="devAddXP()">+50 XP</button>
        <button onclick="devAddHP()">+20 HP</button>
        <button onclick="devFullHP()">滿血</button>
        <button onclick="devSpawnFruits()">生成果子</button>
        <button onclick="devKillHostiles()">殺死所有敵意生物</button>
        <button onclick="devSpawnNeutral()">生成中立生物</button>
        <button onclick="devSpawnHostile()">生成敵對生物</button>
        <button onclick="devFastForward()">⏩ 快轉5分鐘</button>
        <button onclick="devRewind()">⏪ 倒回5分鐘</button>
        <button onclick="devToggleDayNight()">🌙 切換日夜</button>
    </div>
</div>
<div id="game-tooltip"></div>

<script src="config/gameConfig.js"></script>
<script src="config/organs.js"></script>
<script src="config/creatures.js"></script>
<script src="config/evolution.js"></script>
<script src="map/easymap.js"></script>
<script src="lang.js"></script>
<script src="lang/zh-TW.js"></script>
<script src="lang/en.js"></script>
<script src="systems/gameState.js"></script>
<script src="systems/map.js"></script>
<script src="systems/utils.js"></script>
<script src="systems/audio.js"></script>
<script src="systems/camera.js"></script>
<script src="systems/input.js"></script>
<script src="systems/spawning.js"></script>
<script src="systems/player.js"></script>
<script src="systems/combat.js"></script>
<script src="systems/organs.js"></script>
<script src="systems/evolution.js"></script>
<script src="systems/creatures.js"></script>
<script src="systems/elite.js"></script>
<script src="systems/boss.js"></script>
<script src="systems/daynight.js"></script>
<script src="systems/ui.js"></script>
<script src="main.js"></script>

</body>
</html>
